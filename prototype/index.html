    // ----------------------------------------------------------------
    // FURNISHED: dye-vat-room
    //   game-shelf + command-center -> steaming dye vats, hanging cloth,
    //   bamboo poles, tile floor, white plaster, copper vats. Diffuse
    //   window. Dye-stained board (using tapestry theme).
    // ----------------------------------------------------------------
    function buildDyeVatRoom(project, roomTypeId, shared) {
      const tile = tileTexture({ a: '#d8d2c4', b: '#a8a094', grout: '#5a564a' });
      tile.repeat.set(2, 2);
      const floorMat = new THREE.MeshStandardMaterial({
        map: tile, color: 0xd0c8b4, roughness: 0.6
      });
      const plaster = plasterTexture({ base: '#e8e2d0', noise: 8 });
      plaster.repeat.set(2, 1.2);
      const wallMat = new THREE.MeshStandardMaterial({
        map: plaster, color: 0xe0d8c0, roughness: 1.0,
        emissive: 0x4a4030, emissiveIntensity: 0.25
      });
      const ceilingMat = new THREE.MeshStandardMaterial({
        color: 0xf0e8d4, roughness: 1.0, emissive: 0xa08c70, emissiveIntensity: 0.55
      });

      const shell = makeRoomShell({
        width: 7.0, depth: 6.5, height: 4.2,
        floorMaterial: floorMat, ceilingMaterial: ceilingMat,
        wallFront: wallMat, wallBack: wallMat, wallLeft: wallMat, wallRight: wallMat,
        fogColor: 0xd8ccb0, fogNear: 6, fogFar: 24
      });
      const scene = shell.scene;
      const W = shell.width, D = shell.depth, H = shell.height;

      // diffuse window light + ambient — feels like a sun-soaked atelier
      scene.add(new THREE.HemisphereLight(0xfff4e0, 0x6a5840, 1.0));
      scene.add(new THREE.AmbientLight(0xfff0d8, 0.55));
      const window1 = new THREE.DirectionalLight(0xfff4d0, 0.8);
      window1.position.set(-3, 4, 2);
      scene.add(window1);

      // three copper dye vats with brightly colored dye baths
      const copper = new THREE.MeshStandardMaterial({
        color: 0xc06a30, roughness: 0.35, metalness: 0.9
      });
      const copperDark = new THREE.MeshStandardMaterial({
        color: 0x6a3818, roughness: 0.5, metalness: 0.85
      });
      const dyes = [
        { liquid: 0x8a2868, glow: 0x4a1030 },   // magenta
        { liquid: 0x4030a8, glow: 0x1a1050 },   // indigo
        { liquid: 0xd8a020, glow: 0x6a4810 }    // saffron yellow
      ];
      for (let i = 0; i < 3; i++) {
        const x = -2.2 + i * 2.2;
        const z = -0.4;
        // base ring
        const base = new THREE.Mesh(
          new THREE.CylinderGeometry(0.62, 0.66, 0.12, 20),
          copperDark
        );
        base.position.set(x, 0.06, z);
        scene.add(base);
        // vat body
        const body = new THREE.Mesh(
          new THREE.CylinderGeometry(0.6, 0.55, 0.95, 24),
          copper
        );
        body.position.set(x, 0.6, z);
        scene.add(body);
        // liquid surface
        const dye = dyes[i];
        const liquid = new THREE.Mesh(
          new THREE.CircleGeometry(0.55, 24),
          new THREE.MeshStandardMaterial({
            color: dye.liquid, roughness: 0.25, metalness: 0.1,
            emissive: dye.glow, emissiveIntensity: 0.5
          })
        );
        liquid.rotation.x = -Math.PI / 2;
        liquid.position.set(x, 1.05, z);
        scene.add(liquid);
        // a small point light tinted by the dye color (bouncing off the rim)
        const tintLight = new THREE.PointLight(dye.liquid, 0.7, 3, 1.8);
        tintLight.position.set(x, 1.3, z);
        scene.add(tintLight);
        // steam puffs above
        const steamMat = new THREE.MeshBasicMaterial({
          color: 0xffffff, transparent: true, opacity: 0.18
        });
        for (let s = 0; s < 3; s++) {
          const puff = new THREE.Mesh(
            new THREE.SphereGeometry(0.18 + Math.random() * 0.1, 10, 8),
            steamMat
          );
          puff.position.set(x + (Math.random() - 0.5) * 0.3, 1.4 + s * 0.35 + Math.random() * 0.1, z + (Math.random() - 0.5) * 0.3);
          scene.add(puff);
        }
      }

      // horizontal bamboo poles spanning the room high up, with cloth draped over them
      const bamboo = new THREE.MeshStandardMaterial({
        color: 0xc8a868, roughness: 0.85, metalness: 0.0,
        emissive: 0x3a3018, emissiveIntensity: 0.1
      });
      const poleZs = [-D/2 + 1.6, -D/2 + 2.6];
      const clothColors = [0x6a2858, 0x3848a8, 0xc88840, 0xa05060, 0x489088];
      for (let p = 0; p < poleZs.length; p++) {
        const pole = new THREE.Mesh(
          new THREE.CylinderGeometry(0.04, 0.04, W - 0.6, 8),
          bamboo
        );
        pole.rotation.z = Math.PI / 2;
        pole.position.set(0, H - 0.9 - p * 0.2, poleZs[p]);
        scene.add(pole);
        // hang cloth panels off the pole
        const panels = 4;
        for (let i = 0; i < panels; i++) {
          const t = (i + 0.5) / panels;
          const cx = (t - 0.5) * (W - 1.0);
          const c = clothColors[(i + p) % clothColors.length];
          const cloth = new THREE.Mesh(
            new THREE.PlaneGeometry(0.7, 1.2),
            new THREE.MeshStandardMaterial({
              color: c, roughness: 0.95, side: THREE.DoubleSide,
              emissive: c, emissiveIntensity: 0.08
            })
          );
          cloth.position.set(cx, H - 0.9 - p * 0.2 - 0.6, poleZs[p] + (p === 0 ? 0.02 : -0.02));
          // slight tilt for "drape"
          cloth.rotation.z = (Math.random() - 0.5) * 0.2;
          scene.add(cloth);
        }
      }

      // a wooden stirring paddle leaning against the front wall
      const paddleMat = new THREE.MeshStandardMaterial({ color: 0x6a4622, roughness: 0.9 });
      const paddleHandle = new THREE.Mesh(
        new THREE.CylinderGeometry(0.025, 0.025, 1.6, 10),
        paddleMat
      );
      paddleHandle.position.set(W/2 - 0.4, 0.9, -D/2 + 0.6);
      paddleHandle.rotation.z = -Math.PI / 12;
      scene.add(paddleHandle);
      const paddleBlade = new THREE.Mesh(
        new THREE.BoxGeometry(0.12, 0.32, 0.02),
        paddleMat
      );
      paddleBlade.position.set(W/2 - 0.4 + 0.18, 0.18, -D/2 + 0.6);
      paddleBlade.rotation.z = -Math.PI / 12;
      scene.add(paddleBlade);

      // whiteboard with tapestry theme + extra dye-splatter spots
      // overlaid as small emissive discs on the frame for "dye-stained"
      const wb = makePlaceholderWhiteboard({
        width: 2.8, height: 1.7,
        color: 0xe8d4a8, emissive: 0x4a3018, frameColor: 0x3a1a14
      });
      wb.position.set(0, 1.8, -D/2 + 0.04);
      wb.userData.boardKind = 'tapestry';
      // a few colored "splats" on the dark frame
      const splatCols = [0x8a2868, 0x4030a8, 0xd8a020, 0x489088];
      for (let i = 0; i < 8; i++) {
        const sx = (Math.random() - 0.5) * 3.0;
        const sy = (Math.random() < 0.5 ? -1 : 1) * (0.85 + Math.random() * 0.1);
        const col = splatCols[i % splatCols.length];
        const splat = new THREE.Mesh(
          new THREE.CircleGeometry(0.05 + Math.random() * 0.04, 14),
          new THREE.MeshBasicMaterial({ color: col })
        );
        splat.position.set(sx, sy, 0.03);
        wb.add(splat);
      }
      scene.add(wb);

      const backDoor = buildBackDoor(D, shared.doorWood);
      scene.add(backDoor);

      return {
        scene, width: W, depth: D, height: H,
        backDoor, whiteboard: wb,
        entryYaw: 0,
        doors: [backDoor]
      };
    }
    ROOM_BUILDERS['dye-vat-room'] = buildDyeVatRoom;

    // wrap text horizontally; returns the new y after drawing
    function drawWrappedText(ctx, text, x, y, maxWidth, lineHeight) {
      if (!text) return y;
      const words = text.split(/\s+/);
      let line = '';
      for (const w of words) {
        const trial = line ? line + ' ' + w : w;
        if (ctx.measureText(trial).width > maxWidth && line) {
          ctx.fillText(line, x, y);
          y += lineHeight;
          line = w;
        } else {
          line = trial;
        }
      }
      if (line) { ctx.fillText(line, x, y); y += lineHeight; }
      return y;
    }

    function renderWhiteboardCanvas(project, kind) {
      const theme = WB_THEMES[kind] || WB_THEMES['default'];
      const c = document.createElement('canvas');
      c.width = 2048; c.height = 1280;
      const ctx = c.getContext('2d');

      // background
      ctx.fillStyle = theme.bg;
      ctx.fillRect(0, 0, c.width, c.height);
      // inner panel (skipped for chalkboard so text reads on raw slate)
      const pad = 90;
      if (theme.panel) {
        ctx.fillStyle = theme.panel;
        ctx.fillRect(pad - 40, pad - 40, c.width - (pad - 40) * 2, c.height - (pad - 40) * 2);
      }
      if (theme.showFrameLine) {
        ctx.strokeStyle = theme.accent;
        ctx.lineWidth = 4;
        ctx.strokeRect(pad - 20, pad - 20, c.width - (pad - 20) * 2, c.height - (pad - 20) * 2);
      }

      const left = pad + 30;
      const right = c.width - pad - 30;
      const maxW = right - left;
      let y = pad + 90;

      // title
      ctx.fillStyle = theme.text;
      ctx.font = theme.titleFont;
      ctx.textBaseline = 'alphabetic';
      ctx.fillText(project.name, left, y);
      y += 30;

      // tagline (one line; truncate if too long)
      ctx.fillStyle = theme.muted;
      ctx.font = theme.subFont;
      const tagline = project.tagline || '';
      let tag = tagline;
      while (ctx.measureText(tag).width > maxW && tag.length > 4) tag = tag.slice(0, -2);
      if (tag.length < tagline.length) tag = tag.slice(0, -3) + '...';
      ctx.fillText(tag, left, y + 36);
      y += 80;

      // current state (wrapped, 2 lines max)
      if (project.current_state) {
        ctx.fillStyle = theme.text;
        ctx.font = theme.bodyFont;
        const lineH = 42;
        // limit to 2 lines manually
        const words = project.current_state.split(/\s+/);
        let line = '';
        let lines = [];
        for (const w of words) {
          const trial = line ? line + ' ' + w : w;
          if (ctx.measureText(trial).width > maxW && line) {
            lines.push(line); line = w;
            if (lines.length === 2) break;
          } else { line = trial; }
        }
        if (line && lines.length < 2) lines.push(line);
        if (lines.length === 2 && project.current_state.split(/\s+/).length > lines.join(' ').split(/\s+/).length) {
          // truncate second line with ellipsis
          while (ctx.measureText(lines[1] + '...').width > maxW && lines[1].length > 4) lines[1] = lines[1].slice(0, -1);
          lines[1] += '...';
        }
        for (const ln of lines) { ctx.fillText(ln, left, y); y += lineH; }
        y += 10;
      }

      // divider
      ctx.fillStyle = theme.accent;
      ctx.fillRect(left, y, 320, 3);
      y += 30;

      const lineH = 40;
      const itemGap = 16;

      // ACTION ITEMS
      if (Array.isArray(project.action_items) && project.action_items.length) {
        ctx.fillStyle = theme.accent;
        ctx.font = theme.headingFont;
        ctx.fillText('Action items', left, y);
        y += 56;
        ctx.font = theme.bodyFont;
        ctx.fillStyle = theme.text;
        const items = project.action_items.slice(0, 5);
        for (const item of items) {
          // checkbox
          ctx.strokeStyle = theme.accent;
          ctx.lineWidth = 3;
          ctx.strokeRect(left, y - 28, 28, 28);
          // text (wrapped, max 2 lines)
          const tx = left + 50, tw = maxW - 50;
          const before = y;
          const words = item.split(/\s+/);
          let line = '', lines = [];
          for (const w of words) {
            const trial = line ? line + ' ' + w : w;
            if (ctx.measureText(trial).width > tw && line) {
              lines.push(line); line = w;
              if (lines.length === 2) break;
            } else { line = trial; }
          }
          if (line && lines.length < 2) lines.push(line);
          if (lines.length === 2 && item.split(/\s+/).length > lines.join(' ').split(/\s+/).length) {
            while (ctx.measureText(lines[1] + '...').width > tw && lines[1].length > 4) lines[1] = lines[1].slice(0, -1);
            lines[1] += '...';
          }
          for (const ln of lines) { ctx.fillText(ln, tx, y); y += lineH; }
          y += itemGap;
          // cap total height — if we run past 880, bail
          if (y > 880) break;
        }
        y += 10;
      }

      // OPEN ITEMS (warnings)
      if (Array.isArray(project.open_items) && project.open_items.length && y < 1000) {
        ctx.fillStyle = theme.warn;
        ctx.font = theme.headingFont;
        ctx.fillText('Open items', left, y);
        y += 56;
        ctx.font = theme.bodyFont;
        const items = project.open_items.slice(0, 2);
        for (const item of items) {
          // warning triangle
          ctx.fillStyle = theme.warn;
          ctx.beginPath();
          ctx.moveTo(left + 14, y - 30);
          ctx.lineTo(left + 28, y);
          ctx.lineTo(left, y);
          ctx.closePath();
          ctx.fill();
          // exclamation
          ctx.fillStyle = theme.bg;
          ctx.font = '700 22px sans-serif';
          ctx.fillText('!', left + 11, y - 6);
          ctx.font = theme.bodyFont;
          ctx.fillStyle = theme.text;
          const tx = left + 50, tw = maxW - 50;
          y = drawWrappedText(ctx, item, tx, y, tw, lineH);
          y += itemGap;
          if (y > 1100) break;
        }
        y += 10;
      }

      // RECENT ACTIVITY (always rendered if room — right column placement
      // if there's still vertical budget; otherwise skip)
      if (Array.isArray(project.action_log) && project.action_log.length) {
        // place in a second column on the right half if the first
        // column got tall, otherwise continue below.
        const startCol2 = y > 800;
        let cx = left, cy = y, cw = maxW;
        if (startCol2) {
          cx = left + maxW * 0.55;
          cy = pad + 280;
          cw = maxW * 0.45;
        }
        ctx.fillStyle = theme.accent;
        ctx.font = theme.headingFont;
        ctx.fillText('Recent activity', cx, cy);
        cy += 56;
        ctx.font = theme.bodyFont;
        const entries = project.action_log.slice(0, 3);
        for (const e of entries) {
          ctx.fillStyle = theme.muted;
          ctx.font = theme.dateFont;
          ctx.fillText(e.date, cx, cy);
          cy += 38;
          ctx.fillStyle = theme.text;
          ctx.font = theme.bodyFont;
          cy = drawWrappedText(ctx, e.content, cx, cy, cw, lineH);
          cy += itemGap;
          if (cy > 1200) break;
        }
      }

      // status badge bottom-right
      const statusMeta = {
        shipped: { label: 'Operational', color: '#5fc36a' },
        active:  { label: 'In Build',    color: '#e3a23a' },
        blocked: { label: 'Blocked',     color: '#c44c4c' },
        scoped:  { label: 'Scoped',      color: '#7090c0' },
        planned: { label: 'Planned',     color: '#7090c0' }
      }[project.status] || { label: project.status || '', color: theme.muted };
      ctx.fillStyle = statusMeta.color;
      ctx.font = '700 32px -apple-system, "Segoe UI", sans-serif';
      const label = statusMeta.label.toUpperCase();
      const labelW = ctx.measureText(label).width;
      ctx.fillRect(right - labelW - 40, c.height - pad - 26, labelW + 30, 50);
      ctx.fillStyle = theme.bg;
      ctx.fillText(label, right - labelW - 25, c.height - pad + 8);

      return c;
    }

    function applyWhiteboardData(built, project) {
      const wb = built.whiteboard;
      if (!wb) return;
      const kind = wb.userData.boardKind || 'default';
      const canvas = renderWhiteboardCanvas(project, kind);
      const tex = new THREE.CanvasTexture(canvas);
      tex.colorSpace = THREE.SRGBColorSpace;
      tex.anisotropy = 8;
      // swap to an unlit material so the data is always readable
      // (the rest of the room is correctly lit by its own lights,
      // and the board's frame mesh already carries the surrounding
      // material treatment).
      const board = wb.userData.board;
      if (board) {
        board.material.dispose?.();
        board.material = new THREE.MeshBasicMaterial({ map: tex });
      }
    }

    function buildRoomForProject(project, shared) {
      const roomTypeId = project.room_type || assignRoom(project.id);
      const builder = ROOM_BUILDERS[roomTypeId] || STUB_ROOM_BUILDER;
      const built = builder(project, roomTypeId, shared);
      built.project = project;
      built.roomTypeId = roomTypeId;
      // populate the whiteboard with project data for furnished rooms
      applyWhiteboardData(built, project);
      return built;
    }

    // ----------------------------------------------------------------
    // Animator — drives walk-through and reverse animations.
    // State machine within WorkshopApp; the animator is just a tween
    // helper that resolves a promise on completion.
    //
    // Walk-through timeline:
    //   t=0..300ms       approach: camera moves from lobby-center
    //                              toward door, looking at door
    //   t=300..350ms     flash:    DOM #flash opacity 0->1, then scene swap
    //   t=350..600ms     arrival:  flash 1->0, camera slides slightly
    //                              forward into the room
    //
    // Reverse timeline is the mirror of the above.
    // ----------------------------------------------------------------
    function easeInOutCubic(t) {
      return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
    }

    class Animator {
      constructor(app) {
        this.app = app;
        this.active = null; // { kind, startTime, resolve, ... }
      }
      get isActive() { return this.active !== null; }
      walkIntoRoom(door, roomBuilt) {
        return new Promise(resolve => {
          this.active = {
            kind: 'walk-in',
            startTime: performance.now(),
            duration: 600,
            phases: [300, 50, 250],
            door, roomBuilt,
            // lobby start pose
            fromPos: new THREE.Vector3(0, 1.65, 0),
            // approach destination (just outside the door)
            midPos: door.userData.entryPosition.clone(),
            // door world position used as lookAt during approach
            doorWorld: door.getWorldPosition(new THREE.Vector3()),
            // room arrival pose
            roomStartPos: new THREE.Vector3(0, 1.65, roomBuilt.depth / 2 - 0.4),
            roomEndPos:   new THREE.Vector3(0, 1.65, roomBuilt.depth / 2 - 1.0),
            roomLookAt:   new THREE.Vector3(0, 1.65, -roomBuilt.depth / 2 + 0.4),
            resolve
          };
        });
      }
      walkOutToLobby(backDoor) {
        return new Promise(resolve => {
          this.active = {
            kind: 'walk-out',
            startTime: performance.now(),
            duration: 600,
            phases: [250, 50, 300],
            backDoor,
            // current camera state captured at animation start so the
            // approach phase smoothly leaves from wherever the user was.
            fromPos: this.app.camera.position.clone(),
            // approach the back-door (back of the room)
            midPos: backDoor.userData.entryPosition.clone(),
            backWorld: backDoor.getWorldPosition(new THREE.Vector3()),
            // lobby arrival pose — center of lobby, facing the door
            // we just came out of in the lobby (filled in by app)
            lobbyStartPos: new THREE.Vector3(0, 1.65, 0),
            lobbyEndPos:   new THREE.Vector3(0, 1.65, 0),
            lobbyLookAt:   null, // app supplies this
            resolve
          };
        });
      }
      update() {
        const a = this.active;
        if (!a) return;
        const t = performance.now() - a.startTime;
        const [p1, p2, p3] = a.phases;
        const flashEl = document.getElementById('flash');

        if (a.kind === 'walk-in') {
          if (t < p1) {
            // approach phase
            const k = easeInOutCubic(t / p1);
            const pos = a.fromPos.clone().lerp(a.midPos, k);
            this.app.camera.position.copy(pos);
            this.app.camera.lookAt(a.doorWorld);
            flashEl.style.opacity = '0';
          } else if (t < p1 + p2) {
            // flash phase: fade up, swap scene at midpoint
            const phaseT = (t - p1) / p2;
            flashEl.style.opacity = String(phaseT);
            if (!a.swapped && phaseT >= 0.5) {
              // swap to room scene + position camera at room start
              this.app.swapToRoomScene(a.roomBuilt);
              a.swapped = true;
            }
          } else if (t < p1 + p2 + p3) {
            // arrival phase: fade down, slide forward into room
            const phaseT = (t - p1 - p2) / p3;
            flashEl.style.opacity = String(1 - phaseT);
            const pos = a.roomStartPos.clone().lerp(a.roomEndPos, easeInOutCubic(phaseT));
            this.app.camera.position.copy(pos);
            this.app.camera.lookAt(a.roomLookAt);
          } else {
            flashEl.style.opacity = '0';
            this.app.camera.position.copy(a.roomEndPos);
            this.app.camera.lookAt(a.roomLookAt);
            // Hand control back to the controller, aligned with the
            // room's entry yaw.
            this.app.controller.setHeading(a.roomBuilt.entryYaw || 0);
            this.app.controller.enabled = true;
            this.active = null;
            a.resolve();
          }
        } else if (a.kind === 'walk-out') {
          // p1 = approach to back door (250)
          // p2 = flash (50)
          // p3 = arrival in lobby (300)
          if (t < p1) {
            const k = easeInOutCubic(t / p1);
            const pos = a.fromPos.clone().lerp(a.midPos, k);
            this.app.camera.position.copy(pos);
            this.app.camera.lookAt(a.backWorld);
            flashEl.style.opacity = '0';
          } else if (t < p1 + p2) {
            const phaseT = (t - p1) / p2;
            flashEl.style.opacity = String(phaseT);
            if (!a.swapped && phaseT >= 0.5) {
              this.app.swapToLobbyScene();
              a.swapped = true;
            }
          } else if (t < p1 + p2 + p3) {
            const phaseT = (t - p1 - p2) / p3;
            flashEl.style.opacity = String(1 - phaseT);
            const pos = a.lobbyStartPos.clone().lerp(a.lobbyEndPos, easeInOutCubic(phaseT));
            this.app.camera.position.copy(pos);
            if (a.lobbyLookAt) this.app.camera.lookAt(a.lobbyLookAt);
          } else {
            flashEl.style.opacity = '0';
            this.app.camera.position.copy(a.lobbyEndPos);
            // Restore controller heading to face the lobby door the
            // user just exited (so spatial continuity is preserved).
            if (a.lobbyLookAt) {
              const dx = a.lobbyLookAt.x - a.lobbyEndPos.x;
              const dz = a.lobbyLookAt.z - a.lobbyEndPos.z;
              const yaw = Math.atan2(dx, -dz);
              this.app.controller.setHeading(yaw);
            }
            this.app.controller.enabled = true;
            this.active = null;
            a.resolve();
          }
        }
      }
    }

    // ----------------------------------------------------------------
    // WorkshopApp — boots Three.js, builds the lobby, drives the loop,
    // handles walk-through animations and back-to-lobby returns.
    // ----------------------------------------------------------------
    class WorkshopApp {
      constructor(canvas, projectsData) {
        this.canvas = canvas;
        this.projectsData = projectsData;
        this.renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
        this.renderer.outputColorSpace = THREE.SRGBColorSpace;
        this.renderer.toneMapping = THREE.ACESFilmicToneMapping;
        this.renderer.toneMappingExposure = 1.15;
        this._resize();
        window.addEventListener('resize', () => this._resize());

        this.camera = new THREE.PerspectiveCamera(72, window.innerWidth / window.innerHeight, 0.05, 80);
        this.camera.position.set(0, 1.65, 0);

        this.controller = new CameraController(this.camera, canvas);
        this.picker = new HoverPicker(this.camera, canvas);

        this.shared = makeSharedTextures();

        const built = buildLobby(this.projectsData);
        this.lobbyScene = built.scene;
        this.lobbyDoors = built.doors;
        this.activeScene = this.lobbyScene;
        this.picker.setTargets(this.lobbyDoors);

        // State machine: 'lobby' | 'walking-in' | 'in-room' | 'walking-out'
        this.mode = 'lobby';
        // Built rooms are cached so re-entering doesn't rebuild.
        this.roomCache = new Map();
        this.currentRoom = null;
        // Record of which lobby door the user took, so on return the
        // controller's heading restores facing that door (spatial
        // continuity per spec).
        this.returnDoorWorld = null;

        this.animator = new Animator(this);

        // Initial heading: face the app cluster (centered on 0 deg).
        this.controller.setHeading(THREE.MathUtils.degToRad(90));

        // Track mousedown -> mouseup distance so we can distinguish a
        // tap (small movement = door pick) from a drag (large movement
        // = look-around). A pure 'click' event still fires after a
        // small drag in most browsers, which would inadvertently
        // teleport the user into a room while they were panning.
        let downAt = null;
        canvas.addEventListener('mousedown', (e) => {
          if (e.button === 0) downAt = { x: e.clientX, y: e.clientY };
        });
        this._onClick = (e) => {
          if (this.animator.isActive) return;
          if (downAt) {
            const dx = e.clientX - downAt.x, dy = e.clientY - downAt.y;
            downAt = null;
            if (dx * dx + dy * dy > 36) return; // moved > 6px: treat as drag
          }
          const hov = this.picker.hovered;
          if (!hov) return;
          if (hov.userData.isBack) {
            this._returnToLobby();
          } else {
            this._enterDoor(hov);
          }
        };
        canvas.addEventListener('click', this._onClick);

        this._onKey = (e) => {
          if (e.key === 'Escape' && this.mode === 'in-room' && !this.animator.isActive) {
            this._returnToLobby();
          }
        };
        window.addEventListener('keydown', this._onKey);

        this.clock = new THREE.Clock();
        this._loop = this._loop.bind(this);
        requestAnimationFrame(this._loop);
      }
      _enterDoor(doorGroup) {
        const project = doorGroup.userData.project;
        const roomTypeId = project.room_type || assignRoom(project.id);
        let built = this.roomCache.get(project.id);
        if (!built) {
          built = buildRoomForProject(project, this.shared);
          this.roomCache.set(project.id, built);
        }
        this.currentRoom = built;
        this.returnDoorWorld = doorGroup.getWorldPosition(new THREE.Vector3());

        // Hand off control to the animator.
        this.controller.enabled = false;
        this.mode = 'walking-in';
        this.picker.setTargets([]);

        // Update overlay text.
        document.getElementById('subtitle').textContent =
          project.name + (ROOM_BUILDERS[roomTypeId] ? '' : ' (stub room)');
        document.getElementById('hint').classList.add('hidden');
        document.getElementById('back-hint').classList.remove('hidden');

        this.animator.walkIntoRoom(doorGroup, built).then(() => {
          this.mode = 'in-room';
          this.picker.setTargets(built.doors);
        });
      }
      _returnToLobby() {
        if (!this.currentRoom) return;
        this.controller.enabled = false;
        this.mode = 'walking-out';
        this.picker.setTargets([]);

        const anim = this.animator.walkOutToLobby(this.currentRoom.backDoor);
        // Supply lobby start/end + look-at so the camera arrives at
        // the lobby center facing the door it came out of (symmetric
        // to the walk-in: the room ends with a forward-slide, the
        // lobby starts with a step-back from that door).
        const a = this.animator.active;
        if (a && this.returnDoorWorld) {
          const ret = this.returnDoorWorld;
          a.lobbyStartPos = new THREE.Vector3(ret.x * 0.55, 1.65, ret.z * 0.55);
          a.lobbyEndPos   = new THREE.Vector3(0, 1.65, 0);
          a.lobbyLookAt   = ret.clone();
        }

        document.getElementById('subtitle').textContent = 'Lobby';
        document.getElementById('back-hint').classList.add('hidden');
        document.getElementById('hint').classList.remove('hidden');
        document.getElementById('hint').classList.remove('dim');
        setTimeout(() => document.getElementById('hint').classList.add('dim'), 4500);

        anim.then(() => {
          this.mode = 'lobby';
          this.currentRoom = null;
          this.picker.setTargets(this.lobbyDoors);
        });
      }
      swapToRoomScene(roomBuilt) {
        this.activeScene = roomBuilt.scene;
      }
      swapToLobbyScene() {
        this.activeScene = this.lobbyScene;
      }
      _resize() {
        const w = window.innerWidth, h = window.innerHeight;
        this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        this.renderer.setSize(w, h, false);
        if (this.camera) {
          this.camera.aspect = w / h;
          this.camera.updateProjectionMatrix();
        }
      }
      _loop() {
        const dt = Math.min(0.05, this.clock.getDelta());
        if (this.animator.isActive) {
          this.animator.update();
        } else {
          this.controller.update(dt);
        }
        this.picker.update();
        this.renderer.render(this.activeScene, this.camera);
        requestAnimationFrame(this._loop);
      }
    }

    // ----------------------------------------------------------------
    // Bootstrap.
    // ----------------------------------------------------------------
    (async () => {
      const { data: projectsData, source } = await loadProjects();
      console.log(`[the_workshop] projects loaded via ${source}, ${projectsData.projects.length} projects`);

      const canvas = document.getElementById('view');
      const app = new WorkshopApp(canvas, projectsData);
      window.__workshop = app; // dev convenience

      // hide the loading overlay
      const loading = document.getElementById('loading');
      loading.classList.add('hidden');
      // dim the hint after a few seconds
      setTimeout(() => document.getElementById('hint').classList.add('dim'), 6500);
    })();
  </script>
</body>
</html>
