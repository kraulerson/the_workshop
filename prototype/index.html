<!--
The Workshop — Panorama Prototype v1
====================================

Cognitive-accommodation dashboard. A 360° lobby with doors leading to
project rooms, rendered with Three.js. The metaphor is load-bearing:
spatial separation gives Karl's mind an anchor point per project so
context-switching has recall.

See:
- docs/adr/0001-design-decisions.md  — seven design decisions, "cognitive accommodation" reframe
- docs/room-catalog.md               — 50 room type specs + FNV-1a assignment algorithm
- data/projects.json                 — verified-as-of-2026-05-16 project inventory

----------------------------------------------------------------------
PLAN
----------------------------------------------------------------------

Scene structure
---------------
Single Three.js WebGLRenderer + PerspectiveCamera at fixed center.
Two top-level scenes managed by a SceneManager:

  - lobby     — built once on init. 14 doors arranged in a circle by
                domain cluster. Wood floor, brick walls, exposed beams,
                warm pendant lighting.
  - room      — lazily built on door click. Each room is its own
                THREE.Scene constructed by a builder registered in
                ROOM_BUILDERS keyed by room_type id. Unknown ids fall
                back to STUB_ROOM_BUILDER.

Camera sits at origin in every scene. The user only rotates the camera;
they do not translate. Walk-through animation is the only thing that
moves the camera.

Door arrangement (stable, deterministic)
----------------------------------------
14 floor-station projects (status in {shipped, active, blocked}). The
4 annex projects (status in {scoped, planned}) are skipped in v1.

Sorted by domain then alphabetically within domain. Domains placed in
fixed angular ranges so the cluster geometry is permanent across
sessions:

  framework        ->  angles around 270 deg (left of forward)
  app              ->  angles around 0 deg   (forward, biggest cluster)
  mcp              ->  angles around 90 deg  (right)
  infrastructure   ->  angles around 180 deg (behind)

Status shape next to label (colorblind-safe; shape carries the signal):
  shipped = circle, active = square, blocked = triangle.

Room assignment (FNV-1a 32-bit, mod 50)
---------------------------------------
  hash(projectId) % 50  ->  index into the 50-room catalog.

Computed at runtime for any project without an explicit `room_type`.
Verified mapping for current floor projects (2026-05-16 data):

  solo-orchestrator       -> photography-darkroom    ★ FURNISHED
  claude-dev-framework    -> greenhouse              ★ FURNISHED
  alden-stack             -> blacksmith-forge        ★ FURNISHED
  game-shelf              -> dye-vat-room            stub
  k-pdf                   -> glassblowing-studio     stub
  karlban                 -> textile-loom-room       stub
  lancache-orchestrator   -> foundry                 stub
  meshscope               -> radio-station           stub
  reminder-app            -> watchmaker-bench        stub
  command-center          -> dye-vat-room            stub
  memoryco-collab         -> ceramics-studio         stub
  ferrum-corde-llc        -> textile-loom-room       stub
  homelab-core            -> brewery                 stub
  homelab-tls-edge        -> cnc-mill-cell           stub

Furnished room rationale: three flagship projects (solo-orchestrator,
claude-dev-framework, alden-stack) and maximum visual variety —
red-lit dark + bright airy daylight + warm forge orange.

Data loading strategy (both, per spec)
--------------------------------------
1. Embedded JSON in a <script type="application/json"> block — the
   canonical source bundled at build time so file:// works.
2. On startup, try fetch('../data/projects.json'). If it succeeds
   (HTTP served) use the live data; otherwise fall back to embedded.

Interaction model
-----------------
  - Click-drag: grab-and-pull rotation, drag-distance maps to angle
    (no passive mouse-follow -- the room only turns while you drag)
  - Hover door: glow + scale-up, cursor -> pointer
  - Click door: 600ms walk-through (approach 300 / flash 50 / arrival 250)
  - Inside a room: same pan controls + "back to lobby" door behind user
  - Escape: any time inside a room, return to lobby

Textures
--------
All materials are procedural (CanvasTexture for brick/wood/plaster grain,
plus shader-free colored MeshStandardMaterial). No external image
textures in v1 — keeps the file fully self-contained under 5MB without
needing base64 binary blobs, and the cognitive-accommodation function
does not depend on photoreal materials.

Out of scope for v1 (deferred)
------------------------------
  - 47 of the 50 room types furnished (3 furnished + 11 unique stubs)
  - Annex view for scoped/planned projects
  - Editing whiteboard data inside the dashboard
  - Multi-floor / multi-building layouts
  - Touch / mobile support
  - LOD, instancing, compressed textures, persistent camera state
-->

  <script type="module">
    import * as THREE from 'https://esm.sh/three@0.169.0';

    // ----------------------------------------------------------------
    // Room catalog — the 50 IDs from docs/room-catalog.md, in catalog
    // order. Used by the FNV-1a deterministic assignment algorithm.
    // ----------------------------------------------------------------
    const ROOM_CATALOG = [
      'industrial-machine-shop','electronics-lab','woodshop','foundry','drafting-studio',
      'code-lab','library','observatory','greenhouse','server-closet',
      'atelier','brewery','blacksmith-forge','photography-darkroom','music-recording-booth',
      'glassblowing-studio','ceramics-studio','mechanics-garage','paint-studio','leather-workshop',
      'brass-instrument-shop','watchmaker-bench','cartography-room','apothecary','textile-loom-room',
      'luthier-shop','printmaking-studio','boatbuilding-shed','jewelry-bench','cobbler-shop',
      'taxidermy-studio','butterfly-collection-room','alchemist-laboratory','cartoonist-studio','radio-station',
      'brewery-yeast-lab','ceramic-3d-printer-lab','cnc-mill-cell','dye-vat-room','herbalist-drying-room',
      'coffee-roastery','cheese-cave','recording-mastering-suite','miniature-painter-studio','clockmaker-workshop',
      'magicians-prep-room','naturalist-field-station','cryptographer-room','submarine-control-room','zen-tea-room'
    ];

    // FNV-1a 32-bit. Identical to the algorithm sketch in
    // docs/room-catalog.md so JS, Python, etc. agree on assignments.
    function fnv1a32(str) {
      let h = 0x811c9dc5;
      for (let i = 0; i < str.length; i++) {
        h ^= str.charCodeAt(i);
        h = Math.imul(h, 0x01000193) >>> 0;
      }
      return h >>> 0;
    }
    function assignRoom(projectId) {
      return ROOM_CATALOG[fnv1a32(projectId) % ROOM_CATALOG.length];
    }

    // ----------------------------------------------------------------
    // Data loading: try live fetch, fall back to embedded JSON.
    // ----------------------------------------------------------------
    async function loadProjects() {
      try {
        const r = await fetch('../data/projects.json', { cache: 'no-cache' });
        if (r.ok) return { data: await r.json(), source: 'fetch' };
      } catch (_) { /* fall through to embedded */ }
      const el = document.getElementById('projects-data');
      return { data: JSON.parse(el.textContent), source: 'embedded' };
    }

    // ----------------------------------------------------------------
    // Procedural CanvasTextures. All tile via RepeatWrapping.
    // Kept small (256-512px) so total memory stays light.
    // ----------------------------------------------------------------
    function brickTexture({size=512, brickW=80, brickH=28, mortar='#3a2a22', baseR=140, baseG=72, baseB=58, jitter=30} = {}) {
      const c = document.createElement('canvas');
      c.width = c.height = size;
      const ctx = c.getContext('2d');
      ctx.fillStyle = mortar;
      ctx.fillRect(0, 0, size, size);
      for (let y = 0, row = 0; y < size + brickH; y += brickH, row++) {
        const offset = (row % 2) * (brickW / 2);
        for (let x = -brickW; x < size + brickW; x += brickW) {
          const bx = x + offset;
          const r = baseR + Math.floor((Math.random() - 0.5) * jitter * 2);
          const g = baseG + Math.floor((Math.random() - 0.5) * jitter);
          const b = baseB + Math.floor((Math.random() - 0.5) * jitter);
          ctx.fillStyle = `rgb(${r},${g},${b})`;
          ctx.fillRect(bx + 2, y + 2, brickW - 4, brickH - 4);
          // subtle highlight on top edge
          ctx.fillStyle = `rgba(255,220,180,0.08)`;
          ctx.fillRect(bx + 2, y + 2, brickW - 4, 2);
        }
      }
      const tex = new THREE.CanvasTexture(c);
      tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
      tex.colorSpace = THREE.SRGBColorSpace;
      return tex;
    }

    function woodTexture({size=512, base='#6b3f24', dark='#3a1f10', stripes=14} = {}) {
      const c = document.createElement('canvas');
      c.width = c.height = size;
      const ctx = c.getContext('2d');
      ctx.fillStyle = base;
      ctx.fillRect(0, 0, size, size);
      const plankH = size / stripes;
      for (let i = 0; i < stripes; i++) {
        const y = i * plankH;
        // plank tint variation
        const tint = Math.floor((Math.random() - 0.5) * 25);
        ctx.fillStyle = `rgba(${tint > 0 ? 60+tint : 30-tint},${tint > 0 ? 35+tint : 20},${15},0.4)`;
        ctx.fillRect(0, y, size, plankH);
        // dark seam
        ctx.fillStyle = dark;
        ctx.fillRect(0, y, size, 2);
        // grain lines
        ctx.strokeStyle = 'rgba(20,10,5,0.18)';
        ctx.lineWidth = 1;
        for (let g = 0; g < 3; g++) {
          const gy = y + 4 + Math.random() * (plankH - 8);
          ctx.beginPath();
          ctx.moveTo(0, gy);
          for (let x = 0; x < size; x += 24) {
            ctx.lineTo(x, gy + (Math.random() - 0.5) * 2);
          }
          ctx.stroke();
        }
      }
      const tex = new THREE.CanvasTexture(c);
      tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
      tex.colorSpace = THREE.SRGBColorSpace;
      return tex;
    }

    function plasterTexture({size=512, base='#d8c8a8', noise=15} = {}) {
      const c = document.createElement('canvas');
      c.width = c.height = size;
      const ctx = c.getContext('2d');
      ctx.fillStyle = base;
      ctx.fillRect(0, 0, size, size);
      const img = ctx.getImageData(0, 0, size, size);
      const d = img.data;
      for (let i = 0; i < d.length; i += 4) {
        const n = (Math.random() - 0.5) * noise;
        d[i]   = Math.max(0, Math.min(255, d[i]   + n));
        d[i+1] = Math.max(0, Math.min(255, d[i+1] + n));
        d[i+2] = Math.max(0, Math.min(255, d[i+2] + n));
      }
      ctx.putImageData(img, 0, 0);
      const tex = new THREE.CanvasTexture(c);
      tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
      tex.colorSpace = THREE.SRGBColorSpace;
      return tex;
    }

    // ----------------------------------------------------------------
    // Door builder. Each door is a Group with:
    //   - frame (dark stained wood box around the panel)
    //   - panel (medium wood, slight inward bevel via two planes)
    //   - label plane above with project name + status shape
    // The Group's userData carries the project record + entry pose so
    // raycaster results in lobby code stay clean.
    // ----------------------------------------------------------------
    const STATUS_GLYPHS = {
      shipped: { shape: 'circle',   color: '#5fc36a', label: 'Operational' },
      active:  { shape: 'square',   color: '#e3a23a', label: 'In Build'    },
      blocked: { shape: 'triangle', color: '#c44c4c', label: 'Blocked'     }
    };

    function doorLabelTexture(project) {
      const w = 1024, h = 256;
      const c = document.createElement('canvas');
      c.width = w; c.height = h;
      const ctx = c.getContext('2d');
      // brass plaque background — warm cream that contrasts with brick
      const grad = ctx.createLinearGradient(0, 0, 0, h);
      grad.addColorStop(0, '#e8d8a8');
      grad.addColorStop(1, '#c8a868');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, w, h);
      // dark inner border for definition against the brick
      ctx.strokeStyle = '#3a2410';
      ctx.lineWidth = 8;
      ctx.strokeRect(10, 10, w - 20, h - 20);
      // brass edge
      ctx.strokeStyle = '#a07a3a';
      ctx.lineWidth = 3;
      ctx.strokeRect(14, 14, w - 28, h - 28);

      // status shape (left side)
      const glyph = STATUS_GLYPHS[project.status] || STATUS_GLYPHS.active;
      const cx = 90, cy = h / 2, sz = 56;
      ctx.fillStyle = glyph.color;
      ctx.strokeStyle = '#1a1108';
      ctx.lineWidth = 5;
      if (glyph.shape === 'circle') {
        ctx.beginPath(); ctx.arc(cx, cy, sz/2, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
      } else if (glyph.shape === 'square') {
        ctx.fillRect(cx - sz/2, cy - sz/2, sz, sz);
        ctx.strokeRect(cx - sz/2, cy - sz/2, sz, sz);
      } else {
        // equilateral triangle pointing up
        ctx.beginPath();
        ctx.moveTo(cx, cy - sz/2);
        ctx.lineTo(cx + sz/2, cy + sz/2);
        ctx.lineTo(cx - sz/2, cy + sz/2);
        ctx.closePath();
        ctx.fill(); ctx.stroke();
      }

      // name — dark on cream for legibility against brick
      ctx.fillStyle = '#1a1108';
      ctx.textBaseline = 'middle';
      ctx.font = '600 56px -apple-system, "Segoe UI", Helvetica, sans-serif';
      // wrap long names
      const maxTextW = w - 200;
      const words = project.name.split(/\s+/);
      const lines = [];
      let line = '';
      for (const word of words) {
        const candidate = line ? line + ' ' + word : word;
        if (ctx.measureText(candidate).width > maxTextW && line) {
          lines.push(line); line = word;
        } else {
          line = candidate;
        }
      }
      if (line) lines.push(line);
      if (lines.length > 2) { lines.length = 2; lines[1] = lines[1].slice(0, -1) + '...'; }
      const fontSize = lines.length === 1 ? 56 : 42;
      ctx.font = `600 ${fontSize}px -apple-system, "Segoe UI", Helvetica, sans-serif`;
      const totalH = lines.length * fontSize * 1.1;
      let ty = h/2 - totalH/2 + fontSize/2;
      for (const ln of lines) {
        ctx.fillText(ln, 160, ty);
        ty += fontSize * 1.1;
      }

      const tex = new THREE.CanvasTexture(c);
      tex.colorSpace = THREE.SRGBColorSpace;
      tex.anisotropy = 8;
      return tex;
    }

    function buildDoor(project, woodTex) {
      const group = new THREE.Group();
      group.name = `door:${project.id}`;

      // panel
      const panelW = 1.4, panelH = 2.4, panelD = 0.08;
      const panelMat = new THREE.MeshStandardMaterial({
        map: woodTex,
        color: 0x8a5a35,
        roughness: 0.85,
        metalness: 0.05
      });
      const panel = new THREE.Mesh(
        new THREE.BoxGeometry(panelW, panelH, panelD),
        panelMat
      );
      panel.position.y = panelH / 2;
      group.add(panel);

      // frame: thin box around panel
      const frameMat = new THREE.MeshStandardMaterial({
        color: 0x2c1a0e, roughness: 0.95, metalness: 0.0
      });
      const frameDepth = 0.14, frameThick = 0.12;
      const top = new THREE.Mesh(new THREE.BoxGeometry(panelW + frameThick * 2, frameThick, frameDepth), frameMat);
      top.position.set(0, panelH + frameThick/2, 0);
      group.add(top);
      const left = new THREE.Mesh(new THREE.BoxGeometry(frameThick, panelH + frameThick * 2, frameDepth), frameMat);
      left.position.set(-panelW/2 - frameThick/2, panelH/2 + frameThick/2 - frameThick/2, 0);
      group.add(left);
      const right = left.clone();
      right.position.x = panelW/2 + frameThick/2;
      group.add(right);

      // doorknob
      const knobMat = new THREE.MeshStandardMaterial({ color: 0xb38b3d, roughness: 0.4, metalness: 0.6 });
      const knob = new THREE.Mesh(new THREE.SphereGeometry(0.06, 16, 12), knobMat);
      knob.position.set(panelW/2 - 0.18, panelH/2, panelD/2 + 0.02);
      group.add(knob);

      // label plaque above the frame
      const labelTex = doorLabelTexture(project);
      const labelMat = new THREE.MeshBasicMaterial({ map: labelTex, transparent: false });
      const labelW = panelW + frameThick * 2 + 0.4;
      const labelH = labelW * (256/1024);
      const label = new THREE.Mesh(new THREE.PlaneGeometry(labelW, labelH), labelMat);
      label.position.set(0, panelH + frameThick + labelH/2 + 0.1, 0.01);
      group.add(label);

      // raycast target — a single oversized plane that catches clicks
      // on either the panel or the label without the per-mesh hit
      // ambiguity that nested meshes would create.
      const hitMat = new THREE.MeshBasicMaterial({ visible: false });
      const hit = new THREE.Mesh(
        new THREE.PlaneGeometry(panelW + frameThick * 2 + 0.4, panelH + frameThick * 2 + labelH + 0.2),
        hitMat
      );
      hit.position.set(0, (panelH + frameThick + labelH + 0.1) / 2 + 0.1, 0.02);
      hit.userData.isDoorHit = true;
      group.add(hit);

      group.userData = {
        project,
        hitMesh: hit,
        panel,
        label,
        // for hover scale-up
        baseScale: 1,
        hoverScale: 1.06,
        // entry pose for walk-through (filled in by lobby builder)
        entryPosition: null,
        entryLookAt: null
      };
      return group;
    }

    // ----------------------------------------------------------------
    // Lobby builder.
    // 14 doors clustered by domain at fixed angular ranges.
    // ----------------------------------------------------------------
    const DOMAIN_CLUSTER = {
      framework:      { centerDeg: 270, spanDeg: 30 },
      app:            { centerDeg:   0, spanDeg: 80 },
      mcp:            { centerDeg:  90, spanDeg: 40 },
      infrastructure: { centerDeg: 180, spanDeg: 40 }
    };
    const DOMAIN_ORDER = ['framework', 'app', 'mcp', 'infrastructure'];

    function floorStations(projectsData) {
      const floor = projectsData.projects.filter(p =>
        p.status === 'shipped' || p.status === 'active' || p.status === 'blocked'
      );
      // Sort by domain order, then alphabetically by id within domain.
      floor.sort((a, b) => {
        const da = DOMAIN_ORDER.indexOf(a.domain);
        const db = DOMAIN_ORDER.indexOf(b.domain);
        if (da !== db) return da - db;
        return a.id.localeCompare(b.id);
      });
      return floor;
    }

    function doorAnglesByDomain(projects) {
      // Group projects by domain, then spread within each cluster's arc.
      const byDomain = {};
      for (const p of projects) {
        (byDomain[p.domain] ||= []).push(p);
      }
      const result = []; // [{ project, angleDeg }]
      for (const domain of DOMAIN_ORDER) {
        const list = byDomain[domain] || [];
        if (!list.length) continue;
        const cluster = DOMAIN_CLUSTER[domain];
        const { centerDeg, spanDeg } = cluster;
        const n = list.length;
        // Distribute n doors centered on centerDeg, spanning spanDeg.
        // For n=1, just centerDeg; for n>1, evenly spaced.
        const step = n > 1 ? spanDeg / (n - 1) : 0;
        const start = centerDeg - spanDeg / 2;
        for (let i = 0; i < n; i++) {
          const angleDeg = n === 1 ? centerDeg : start + step * i;
          result.push({ project: list[i], angleDeg });
        }
      }
      return result;
    }

    function buildLobby(projectsData) {
      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x18110a);
      scene.fog = new THREE.Fog(0x18110a, 12, 26);

      const radius = 8;
      const height = 6;

      // floor — warm wood
      const floorWood = woodTexture({ base: '#5a3522', dark: '#2a1408', stripes: 10 });
      floorWood.repeat.set(4, 4);
      const floorMat = new THREE.MeshStandardMaterial({
        map: floorWood, color: 0xa07050, roughness: 0.9, metalness: 0.0
      });
      const floor = new THREE.Mesh(new THREE.CircleGeometry(radius, 64), floorMat);
      floor.rotation.x = -Math.PI / 2;
      floor.position.y = 0;
      scene.add(floor);

      // walls — brick cylinder, interior visible
      const brick = brickTexture({});
      brick.repeat.set(6, 2);
      const wallMat = new THREE.MeshStandardMaterial({
        map: brick, color: 0xb08070, roughness: 0.95, metalness: 0.0, side: THREE.BackSide
      });
      const wall = new THREE.Mesh(
        new THREE.CylinderGeometry(radius, radius, height, 64, 1, true),
        wallMat
      );
      wall.position.y = height / 2;
      scene.add(wall);

      // ceiling — plaster, dimmer
      const plaster = plasterTexture({ base: '#a08660', noise: 18 });
      plaster.repeat.set(2, 2);
      const ceilingMat = new THREE.MeshStandardMaterial({
        map: plaster, color: 0x705030, roughness: 1.0, metalness: 0.0
      });
      const ceiling = new THREE.Mesh(new THREE.CircleGeometry(radius, 64), ceilingMat);
      ceiling.rotation.x = Math.PI / 2;
      ceiling.position.y = height;
      scene.add(ceiling);

      // exposed wooden beams across the ceiling
      const beamWood = new THREE.MeshStandardMaterial({
        color: 0x3a2410, roughness: 0.9, metalness: 0.0
      });
      const beamCount = 5;
      for (let i = 0; i < beamCount; i++) {
        const t = (i + 1) / (beamCount + 1);
        const x = (t - 0.5) * 2 * radius;
        const beam = new THREE.Mesh(
          new THREE.BoxGeometry(0.4, 0.35, 2 * Math.sqrt(Math.max(0, radius*radius - x*x))),
          beamWood
        );
        beam.position.set(x, height - 0.25, 0);
        scene.add(beam);
      }

      // central pendant light (visible body + light source)
      const pendantGroup = new THREE.Group();
      const cordMat = new THREE.MeshStandardMaterial({ color: 0x1a1108, roughness: 1.0 });
      const cord = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.02, 1.2, 8), cordMat);
      cord.position.y = height - 0.6;
      pendantGroup.add(cord);
      const shadeMat = new THREE.MeshStandardMaterial({
        color: 0x4a2a14, emissive: 0xff9a40, emissiveIntensity: 0.65, roughness: 0.7
      });
      const shade = new THREE.Mesh(new THREE.ConeGeometry(0.45, 0.55, 24, 1, true), shadeMat);
      shade.position.y = height - 1.3;
      shade.material.side = THREE.DoubleSide;
      pendantGroup.add(shade);
      // glowing bulb visible from below
      const bulbMat = new THREE.MeshBasicMaterial({ color: 0xffd28a });
      const bulb = new THREE.Mesh(new THREE.SphereGeometry(0.12, 16, 12), bulbMat);
      bulb.position.y = height - 1.5;
      pendantGroup.add(bulb);
      scene.add(pendantGroup);

      const pendantLight = new THREE.PointLight(0xffb070, 6.5, 26, 1.4);
      pendantLight.position.set(0, height - 1.5, 0);
      scene.add(pendantLight);

      // ambient warm fill so the brick reads even in shadow
      scene.add(new THREE.AmbientLight(0x6a4828, 0.95));
      // a hint of cool from above for contrast
      const topFill = new THREE.HemisphereLight(0x886644, 0x1a0d05, 0.55);
      scene.add(topFill);

      // wall sconces — one per cluster, just past its center, helping
      // readers orient by warmth and giving doors a bit of side light
      for (const dom of DOMAIN_ORDER) {
        const c = DOMAIN_CLUSTER[dom];
        const a = THREE.MathUtils.degToRad(c.centerDeg);
        const sconceLight = new THREE.PointLight(0xff9a55, 3.2, 16, 1.6);
        sconceLight.position.set(
          Math.cos(a) * (radius - 0.7),
          height - 1.6,
          Math.sin(a) * (radius - 0.7)
        );
        scene.add(sconceLight);
        // tiny visible bulb
        const sb = new THREE.Mesh(
          new THREE.SphereGeometry(0.07, 10, 8),
          new THREE.MeshBasicMaterial({ color: 0xffc890 })
        );
        sb.position.copy(sconceLight.position);
        scene.add(sb);
      }

      // doors
      const floorProjects = floorStations(projectsData);
      const placements = doorAnglesByDomain(floorProjects);
      const doorWood = woodTexture({ base: '#7a4d2c', dark: '#2a1408', stripes: 6 });
      const doors = [];
      for (const { project, angleDeg } of placements) {
        const door = buildDoor(project, doorWood);
        const a = THREE.MathUtils.degToRad(angleDeg);
        // Place door against the wall, facing the center.
        const dx = Math.cos(a) * (radius - 0.06);
        const dz = Math.sin(a) * (radius - 0.06);
        door.position.set(dx, 0, dz);
        // Three.js Object3D.lookAt for non-camera objects orients the
        // object's +Z toward the target. The door's front (+Z carries
        // the knob and the label plaque), so we want it pointing at
        // the camera. Target must be at the SAME y as the door,
        // otherwise the door tilts upward and the label drifts
        // beyond the wall radius and is occluded by the wall.
        door.lookAt(0, 0, 0);

        // Entry pose for walk-through animation (defined here so the
        // animator doesn't have to recompute trig).
        door.userData.entryPosition = new THREE.Vector3(dx * 0.55, 1.6, dz * 0.55);
        door.userData.entryLookAt = new THREE.Vector3(dx, 1.6, dz);

        scene.add(door);
        doors.push(door);
      }

      // a faint floor disc/area rug under the camera for cognitive anchor
      const rugMat = new THREE.MeshStandardMaterial({
        color: 0x5a2f1a, roughness: 1.0, metalness: 0.0
      });
      const rug = new THREE.Mesh(new THREE.CircleGeometry(2.2, 48), rugMat);
      rug.rotation.x = -Math.PI / 2;
      rug.position.y = 0.005;
      scene.add(rug);

      return { scene, doors };
    }

    // ----------------------------------------------------------------
    // CameraController — mouse-move passive pan + click-drag fine control.
    // Camera stays at origin (or wherever the SceneManager places it);
    // we only mutate its yaw (and a little pitch).
    // ----------------------------------------------------------------
    class CameraController {
      constructor(camera, dom) {
        this.camera = camera;
        this.dom = dom;
        this.yaw = 0;      // radians, around Y
        this.pitch = 0;    // radians, clamped
        this.targetYaw = 0;
        this.targetPitch = 0;
        this.dragging = false;
        this.dragStart = { x: 0, y: 0, yaw: 0, pitch: 0 };
        this.maxPitch = THREE.MathUtils.degToRad(35);
        this.enabled = true;
        this._bind();
      }
      _bind() {
        const d = this.dom;
        d.addEventListener('mousemove', this._onMove = (e) => {
          if (!this.dragging) return;
          const rect = d.getBoundingClientRect();
          const dx = (e.clientX - this.dragStart.x) / rect.width;
          const dy = (e.clientY - this.dragStart.y) / rect.height;
          // grab-and-pull: drag right rotates the world right (camera
          // turns left). A full-viewport drag rotates ~180 deg yaw /
          // ~80 deg pitch.
          this.targetYaw   = this.dragStart.yaw   - dx * THREE.MathUtils.degToRad(180);
          this.targetPitch = this.dragStart.pitch - dy * THREE.MathUtils.degToRad(80);
          this.targetPitch = THREE.MathUtils.clamp(this.targetPitch, -this.maxPitch, this.maxPitch);
        });
        d.addEventListener('mousedown', this._onDown = (e) => {
          if (e.button !== 0) return;
          this.dragging = true;
          this.dragStart.x = e.clientX; this.dragStart.y = e.clientY;
          this.dragStart.yaw = this.targetYaw;
          this.dragStart.pitch = this.targetPitch;
        });
        window.addEventListener('mouseup', this._onUp = () => { this.dragging = false; });
      }
      setHeading(yawRad, pitchRad = 0) {
        this.yaw = this.targetYaw = yawRad;
        this.pitch = this.targetPitch = pitchRad;
      }
      update(dt) {
        if (!this.enabled) return;
        // No passive mouse-follow — rotation is driven only by
        // click-and-drag. Smoothly chase the target so released
        // drags don't snap.
        const k = 1 - Math.exp(-dt * 8);
        this.yaw   = THREE.MathUtils.lerp(this.yaw,   this.targetYaw,   k);
        this.pitch = THREE.MathUtils.lerp(this.pitch, this.targetPitch, k);
        this._apply();
      }
      _apply() {
        // Build camera orientation from yaw + pitch. Camera looks down -Z by default.
        // We construct a forward vector and use lookAt for stability.
        const cp = Math.cos(this.pitch), sp = Math.sin(this.pitch);
        const cy = Math.cos(this.yaw),   sy = Math.sin(this.yaw);
        const fwd = new THREE.Vector3(sy * cp, sp, -cy * cp);
        const tgt = this.camera.position.clone().add(fwd);
        this.camera.up.set(0, 1, 0);
        this.camera.lookAt(tgt);
      }
    }

    // ----------------------------------------------------------------
    // HoverPicker — raycaster against door hit-meshes.
    // ----------------------------------------------------------------
    class HoverPicker {
      constructor(camera, dom) {
        this.camera = camera;
        this.dom = dom;
        this.raycaster = new THREE.Raycaster();
        this.ndc = new THREE.Vector2();
        this.hovered = null;
        this.targets = []; // door Groups
        dom.addEventListener('mousemove', (e) => {
          const rect = dom.getBoundingClientRect();
          this.ndc.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
          this.ndc.y = -((e.clientY - rect.top)  / rect.height) * 2 + 1;
        });
      }
      setTargets(doors) {
        this.targets = doors;
        this.hovered = null;
      }
      update() {
        if (!this.targets.length) { this._setHover(null); return; }
        this.raycaster.setFromCamera(this.ndc, this.camera);
        // raycast against hit meshes only
        const hits = this.raycaster.intersectObjects(
          this.targets.map(d => d.userData.hitMesh), false
        );
        let next = null;
        if (hits.length) {
          // ascend to the door Group
          let o = hits[0].object;
          while (o && !o.userData?.project) o = o.parent;
          next = o || null;
        }
        this._setHover(next);
      }
      _setHover(next) {
        if (next === this.hovered) return;
        if (this.hovered) this._applyHover(this.hovered, false);
        this.hovered = next;
        if (this.hovered) this._applyHover(this.hovered, true);
        this.dom.style.cursor = this.hovered ? 'pointer' : 'default';
      }
      _applyHover(door, on) {
        const s = on ? door.userData.hoverScale : door.userData.baseScale;
        door.scale.setScalar(s);
        // brighten the panel emissive slightly
        if (door.userData.panel) {
          const m = door.userData.panel.material;
          m.emissive = m.emissive || new THREE.Color(0x000000);
          m.emissive.setHex(on ? 0x402010 : 0x000000);
        }
      }
    }

    // ----------------------------------------------------------------
    // Room shell — reusable box-shaped room geometry. Per-room builders
    // call this to get floor / walls / ceiling, then add decor + a
    // whiteboard on top.
    //
    // Coordinate convention for rooms:
    //   - room is axis-aligned, dims = w (X) by d (Z) by h (Y)
    //   - camera enters at z = +d/2 - 0.4 looking toward -Z
    //     (the FRONT wall, where the whiteboard sits)
    //   - back-door sits on the back wall at z = +d/2
    //   - +X is "right" of camera entry, -X is "left"
    // ----------------------------------------------------------------
    function makeRoomShell(opts) {
      const {
        width = 6.5, depth = 6.5, height = 4.0,
        floorMaterial, ceilingMaterial,
        wallFront, wallBack, wallLeft, wallRight,  // materials, may differ
        fogColor = 0x100808, fogNear = 5, fogFar = 22
      } = opts;

      const scene = new THREE.Scene();
      scene.background = new THREE.Color(fogColor);
      scene.fog = new THREE.Fog(fogColor, fogNear, fogFar);

      const floor = new THREE.Mesh(new THREE.PlaneGeometry(width, depth), floorMaterial);
      floor.rotation.x = -Math.PI / 2;
      scene.add(floor);

      const ceiling = new THREE.Mesh(new THREE.PlaneGeometry(width, depth), ceilingMaterial);
      ceiling.rotation.x = Math.PI / 2;
      ceiling.position.y = height;
      scene.add(ceiling);

      // Walls: each is a plane facing inward.
      const mkWall = (mat, w, h, pos, rotY) => {
        const m = new THREE.Mesh(new THREE.PlaneGeometry(w, h), mat);
        m.position.set(pos.x, pos.y, pos.z);
        m.rotation.y = rotY;
        return m;
      };
      // front wall (camera looks at): z = -depth/2, normal +Z
      scene.add(mkWall(wallFront, width, height, { x: 0, y: height/2, z: -depth/2 }, 0));
      // back wall (behind camera): z = +depth/2, normal -Z
      scene.add(mkWall(wallBack, width, height, { x: 0, y: height/2, z: +depth/2 }, Math.PI));
      // left wall: x = -width/2, normal +X
      scene.add(mkWall(wallLeft, depth, height, { x: -width/2, y: height/2, z: 0 }, Math.PI / 2));
      // right wall: x = +width/2, normal -X
      scene.add(mkWall(wallRight, depth, height, { x: +width/2, y: height/2, z: 0 }, -Math.PI / 2));

      return { scene, width, depth, height };
    }

    // Build a "back door" — same visual style as the lobby doors, but
    // labeled "Lobby" and not driven from project data. Positioned on
    // the back wall of a room (z = +depth/2), facing the camera (+Z
    // pointing toward -Z, i.e. inward). userData mirrors a normal door
    // so HoverPicker / click handler don't need to special-case it.
    function buildBackDoor(roomDepth, doorWoodTex) {
      // Build a synthetic "project record" so doorLabelTexture renders
      // something distinct for the back door.
      const fakeProject = {
        id: '__back__',
        name: 'Back to Lobby',
        status: 'shipped',
      };
      const door = buildDoor(fakeProject, doorWoodTex);
      // Override label glyph color: use a neutral marker instead of
      // shipped-green so it doesn't claim a project status.
      // (Cheap path: just rebuild the label texture with a custom glyph.)
      const labelCanvas = document.createElement('canvas');
      labelCanvas.width = 1024; labelCanvas.height = 256;
      const ctx = labelCanvas.getContext('2d');
      const grad = ctx.createLinearGradient(0, 0, 0, 256);
      grad.addColorStop(0, '#e8d8a8'); grad.addColorStop(1, '#c8a868');
      ctx.fillStyle = grad; ctx.fillRect(0, 0, 1024, 256);
      ctx.strokeStyle = '#3a2410'; ctx.lineWidth = 8;
      ctx.strokeRect(10, 10, 1004, 236);
      ctx.strokeStyle = '#a07a3a'; ctx.lineWidth = 3;
      ctx.strokeRect(14, 14, 996, 228);
      // arrow glyph pointing left
      ctx.strokeStyle = '#1a1108'; ctx.fillStyle = '#1a1108'; ctx.lineWidth = 5;
      ctx.beginPath();
      ctx.moveTo(140, 128); ctx.lineTo(70, 128);
      ctx.moveTo(95, 100); ctx.lineTo(70, 128); ctx.lineTo(95, 156);
      ctx.stroke();
      ctx.font = '600 56px -apple-system, "Segoe UI", Helvetica, sans-serif';
      ctx.textBaseline = 'middle';
      ctx.fillText('Back to Lobby', 180, 128);
      const newTex = new THREE.CanvasTexture(labelCanvas);
      newTex.colorSpace = THREE.SRGBColorSpace;
      newTex.anisotropy = 8;
      door.userData.label.material.map = newTex;
      door.userData.label.material.needsUpdate = true;

      // Place on back wall, facing -Z (i.e. toward room center / -Z direction).
      // Door geometry default front is +Z, and we want +Z to point at -Z world,
      // so rotate 180 deg around Y.
      door.position.set(0, 0, roomDepth / 2 - 0.06);
      door.rotation.y = Math.PI;

      door.userData.isBack = true;
      // Walk-out animation goes from current camera pose to this entry pose.
      door.userData.entryPosition = new THREE.Vector3(0, 1.6, roomDepth / 2 - 1.4);
      door.userData.entryLookAt = new THREE.Vector3(0, 1.6, roomDepth / 2);

      return door;
    }

    // ----------------------------------------------------------------
    // ROOM_BUILDERS — registry keyed by room_type id. Each builder is
    //   (project, roomTypeId, sharedTextures) -> { scene, width, depth,
    //     height, backDoor, entryYaw, doors:[backDoor] }
    // Furnished rooms register their own entries below; everything else
    // falls back to STUB_ROOM_BUILDER.
    // ----------------------------------------------------------------
    const ROOM_BUILDERS = {};

    // Cache of materials/textures that are safe to share across rooms.
    function makeSharedTextures() {
      return {
        doorWood: woodTexture({ base: '#7a4d2c', dark: '#2a1408', stripes: 6 }),
        lobbyFloorWood: null  // for visual continuity in stubs, reuse lobby palette
      };
    }

    // Stub room — placeholder for any room_type that isn't furnished yet.
    // Uses the lobby's procedural materials so it's cheap and visually
    // recognizable as "you stepped through, but this space isn't built".
    function STUB_ROOM_BUILDER(project, roomTypeId, shared) {
      // procedural materials — wood floor + plaster walls + plaster ceiling
      const floorWood = woodTexture({ base: '#4a3022', dark: '#26140a', stripes: 8 });
      floorWood.repeat.set(2, 2);
      const floorMat = new THREE.MeshStandardMaterial({
        map: floorWood, color: 0x7a5238, roughness: 0.9
      });
      const plaster = plasterTexture({ base: '#9a826a', noise: 16 });
      plaster.repeat.set(1.5, 1);
      const wallMat = new THREE.MeshStandardMaterial({
        map: plaster, color: 0x8a705a, roughness: 1.0, side: THREE.FrontSide
      });
      const ceilingMat = new THREE.MeshStandardMaterial({
        color: 0x3a2818, roughness: 1.0
      });

      const shell = makeRoomShell({
        width: 6, depth: 6, height: 3.8,
        floorMaterial: floorMat,
        ceilingMaterial: ceilingMat,
        wallFront: wallMat, wallBack: wallMat,
        wallLeft: wallMat, wallRight: wallMat,
        fogColor: 0x1a120a, fogNear: 4, fogFar: 18
      });
      const scene = shell.scene;

      // a warm pendant
      const bulb = new THREE.PointLight(0xffa658, 1.6, 12, 1.7);
      bulb.position.set(0, shell.height - 0.6, 0);
      scene.add(bulb);
      const bulbMesh = new THREE.Mesh(
        new THREE.SphereGeometry(0.1, 14, 10),
        new THREE.MeshBasicMaterial({ color: 0xffd49a })
      );
      bulbMesh.position.copy(bulb.position);
      scene.add(bulbMesh);
      scene.add(new THREE.AmbientLight(0x4a3018, 0.45));

      // sign on the front wall
      const sign = document.createElement('canvas');
      sign.width = 1024; sign.height = 512;
      const sctx = sign.getContext('2d');
      sctx.fillStyle = '#1a1108'; sctx.fillRect(0, 0, 1024, 512);
      sctx.strokeStyle = '#a07a3a'; sctx.lineWidth = 8;
      sctx.strokeRect(16, 16, 992, 480);
      sctx.fillStyle = '#f0e6d6';
      sctx.textBaseline = 'middle';
      sctx.textAlign = 'center';
      sctx.font = '600 56px -apple-system, "Segoe UI", Helvetica, sans-serif';
      sctx.fillText('This room is not yet built', 512, 200);
      sctx.font = '400 44px -apple-system, "Segoe UI", Helvetica, sans-serif';
      sctx.fillStyle = '#c7b48a';
      sctx.fillText(`type: ${roomTypeId}`, 512, 290);
      sctx.font = '400 28px -apple-system, "Segoe UI", Helvetica, sans-serif';
      sctx.fillStyle = '#a08660';
      sctx.fillText(project.name, 512, 360);
      sctx.fillText(project.tagline || '', 512, 410);
      const signTex = new THREE.CanvasTexture(sign);
      signTex.colorSpace = THREE.SRGBColorSpace;
      signTex.anisotropy = 8;
      const signW = 3.2, signH = signW * (512/1024);
      const signMesh = new THREE.Mesh(
        new THREE.PlaneGeometry(signW, signH),
        new THREE.MeshBasicMaterial({ map: signTex })
      );
      signMesh.position.set(0, 1.8, -shell.depth/2 + 0.02);
      scene.add(signMesh);

      // back door
      const backDoor = buildBackDoor(shell.depth, shared.doorWood);
      scene.add(backDoor);

      return {
        scene,
        width: shell.width, depth: shell.depth, height: shell.height,
        backDoor,
        // Camera enters facing -Z (the front wall with the sign).
        // Controller forward at yaw=0 is (sin 0, 0, -cos 0) = (0, 0, -1),
        // i.e. -Z. So entryYaw = 0.
        entryYaw: 0,
        doors: [backDoor]
      };
    }

    // Shared helper: build a generic "whiteboard" mesh placeholder.
    // Each furnished room can replace the texture later via
    // applyWhiteboardTexture once the data renderer lands; until then
    // we show a dim glow so the wall doesn't read as empty.
    function makePlaceholderWhiteboard({
      width = 2.6, height = 1.6,
      color = 0xf5e6c2, emissive = 0x4a3a1a, frameColor = 0x2a1d10
    } = {}) {
      const group = new THREE.Group();
      const board = new THREE.Mesh(
        new THREE.PlaneGeometry(width, height),
        new THREE.MeshStandardMaterial({
          color, emissive, emissiveIntensity: 0.4,
          roughness: 0.6, metalness: 0.0
        })
      );
      group.add(board);

      const frameThick = 0.08;
      const frameMat = new THREE.MeshStandardMaterial({ color: frameColor, roughness: 0.9 });
      const top = new THREE.Mesh(new THREE.BoxGeometry(width + frameThick*2, frameThick, 0.05), frameMat);
      top.position.set(0, height/2 + frameThick/2, -0.01);
      group.add(top);
      const bottom = top.clone();
      bottom.position.y = -height/2 - frameThick/2;
      group.add(bottom);
      const left = new THREE.Mesh(new THREE.BoxGeometry(frameThick, height + frameThick*2, 0.05), frameMat);
      left.position.set(-width/2 - frameThick/2, 0, -0.01);
      group.add(left);
      const right = left.clone();
      right.position.x = width/2 + frameThick/2;
      group.add(right);

      group.userData = { board, frameColor };
      return group;
    }

    // ----------------------------------------------------------------
    // FURNISHED: photography-darkroom
    //   solo-orchestrator -> red safelight only, painted black walls,
    //   stainless counter, enlarger, drying line, chemistry trays,
    //   backlit etched-glass whiteboard.
    // ----------------------------------------------------------------
    function buildPhotographyDarkroom(project, roomTypeId, shared) {
      // materials
      const blackWall = new THREE.MeshStandardMaterial({
        color: 0x0a0808, roughness: 0.95, metalness: 0.0
      });
      const concrete = plasterTexture({ base: '#1a1614', noise: 8 });
      concrete.repeat.set(3, 3);
      const floorMat = new THREE.MeshStandardMaterial({
        map: concrete, color: 0x121010, roughness: 1.0
      });
      const ceilingMat = new THREE.MeshStandardMaterial({
        color: 0x080606, roughness: 1.0
      });

      const shell = makeRoomShell({
        width: 6.5, depth: 6.0, height: 3.6,
        floorMaterial: floorMat,
        ceilingMaterial: ceilingMat,
        wallFront: blackWall, wallBack: blackWall,
        wallLeft: blackWall, wallRight: blackWall,
        fogColor: 0x0a0404, fogNear: 3.5, fogFar: 14
      });
      const scene = shell.scene;
      const W = shell.width, D = shell.depth, H = shell.height;

      // The signature red safelight — a single low-intensity point
      // light high near the back, color saturated red. We keep ambient
      // VERY low so the darkroom mood lands; the whiteboard provides
      // its own backlight so it stays readable despite the darkness.
      const safelight = new THREE.PointLight(0xff2010, 2.4, 12, 1.6);
      safelight.position.set(0, H - 0.5, D/2 - 0.8);
      scene.add(safelight);
      const safeBulb = new THREE.Mesh(
        new THREE.SphereGeometry(0.09, 14, 10),
        new THREE.MeshBasicMaterial({ color: 0xff5030 })
      );
      safeBulb.position.copy(safelight.position);
      scene.add(safeBulb);
      // very dim red ambient so geometry reads
      scene.add(new THREE.AmbientLight(0x1a0606, 0.55));

      // a second very dim cool spot from above the whiteboard so the
      // data stays legible without breaking the safelight mood
      const wbSpot = new THREE.SpotLight(0xffe0c0, 0.6, 6, Math.PI/5, 0.7, 1.4);
      wbSpot.position.set(0, H - 0.3, -D/2 + 1.8);
      wbSpot.target.position.set(0, 1.6, -D/2 + 0.05);
      scene.add(wbSpot);
      scene.add(wbSpot.target);

      // stainless counter along the right wall
      const steel = new THREE.MeshStandardMaterial({
        color: 0x8a8e92, roughness: 0.35, metalness: 0.85
      });
      const counter = new THREE.Mesh(
        new THREE.BoxGeometry(D - 0.6, 0.06, 0.7),
        steel
      );
      counter.position.set(W/2 - 0.4, 0.9, 0);
      counter.rotation.y = -Math.PI / 2;
      // The geometry is built along X (length D-0.6); rotating around Y
      // by -90 deg leaves it aligned with Z, which is what we want.
      scene.add(counter);
      // counter legs
      const legMat = new THREE.MeshStandardMaterial({ color: 0x303336, roughness: 0.7, metalness: 0.6 });
      const legGeo = new THREE.BoxGeometry(0.06, 0.9, 0.06);
      for (const zp of [-D/2 + 1, 0, D/2 - 1]) {
        for (const dx of [-0.25, 0.25]) {
          const leg = new THREE.Mesh(legGeo, legMat);
          leg.position.set(W/2 - 0.4 + dx, 0.45, zp);
          scene.add(leg);
        }
      }

      // three chemistry trays on the counter — shallow rectangles with
      // a slightly emissive bottom so they catch the red light visibly.
      const trayMat = new THREE.MeshStandardMaterial({
        color: 0x2a2826, roughness: 0.6, metalness: 0.1
      });
      const trayLiquidMat = (hue) => new THREE.MeshStandardMaterial({
        color: hue, roughness: 0.2, metalness: 0.0, emissive: hue, emissiveIntensity: 0.05
      });
      const trayLiquids = [0x3a1a1a, 0x2a1a0e, 0x1a1610];
      for (let i = 0; i < 3; i++) {
        const zp = -D/2 + 1.6 + i * 1.2;
        const tray = new THREE.Mesh(new THREE.BoxGeometry(0.55, 0.04, 0.38), trayMat);
        tray.position.set(W/2 - 0.4, 0.96, zp);
        scene.add(tray);
        const liquid = new THREE.Mesh(new THREE.PlaneGeometry(0.5, 0.34), trayLiquids[i] && trayLiquidMat(trayLiquids[i]));
        liquid.rotation.x = -Math.PI / 2;
        liquid.position.set(W/2 - 0.4, 0.985, zp);
        scene.add(liquid);
      }

      // enlarger near the back-left corner — vertical column on a base,
      // with a head box near the top and a baseboard.
      const enlGroup = new THREE.Group();
      enlGroup.position.set(-W/2 + 1.0, 0, D/2 - 1.3);
      const baseMat = new THREE.MeshStandardMaterial({ color: 0x141414, roughness: 0.8, metalness: 0.3 });
      const enlBase = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.04, 0.6), baseMat);
      enlBase.position.set(0, 0.85, 0);
      enlGroup.add(enlBase);
      const enlBoard = new THREE.Mesh(new THREE.BoxGeometry(0.7, 0.01, 0.5), new THREE.MeshStandardMaterial({ color: 0xe8d4a0, roughness: 0.95 }));
      enlBoard.position.set(0, 0.875, 0);
      enlGroup.add(enlBoard);
      const enlCol = new THREE.Mesh(new THREE.BoxGeometry(0.08, 1.7, 0.08), baseMat);
      enlCol.position.set(-0.25, 1.75, -0.2);
      enlGroup.add(enlCol);
      const enlHead = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.35, 0.4), baseMat);
      enlHead.position.set(0.0, 2.3, -0.2);
      enlGroup.add(enlHead);
      // little red glow under the head — the lamphouse
      const headGlow = new THREE.Mesh(
        new THREE.SphereGeometry(0.06, 10, 8),
        new THREE.MeshBasicMaterial({ color: 0xff4020 })
      );
      headGlow.position.set(0, 2.12, -0.2);
      enlGroup.add(headGlow);
      const headLight = new THREE.PointLight(0xff3010, 0.6, 1.5, 2.0);
      headLight.position.copy(headGlow.position);
      enlGroup.add(headLight);
      scene.add(enlGroup);

      // drying line spanning across the room near the back — cord with
      // a handful of "prints" (small rectangles) clipped to it.
      const cordMat = new THREE.MeshStandardMaterial({ color: 0x444038, roughness: 1.0 });
      const cord = new THREE.Mesh(new THREE.CylinderGeometry(0.01, 0.01, W - 0.8, 6), cordMat);
      cord.rotation.z = Math.PI / 2;
      cord.position.set(0, H - 1.1, D/2 - 1.6);
      scene.add(cord);
      const printMat = new THREE.MeshStandardMaterial({ color: 0xe6dcc8, roughness: 0.9 });
      const printDarkMat = new THREE.MeshStandardMaterial({ color: 0x202020, roughness: 0.9 });
      const prints = 6;
      for (let i = 0; i < prints; i++) {
        const t = (i + 1) / (prints + 1);
        const x = (t - 0.5) * (W - 1);
        const isDark = (i % 2) === 1;
        const print = new THREE.Mesh(
          new THREE.PlaneGeometry(0.32, 0.42),
          isDark ? printDarkMat : printMat
        );
        print.position.set(x, H - 1.35, D/2 - 1.6);
        print.rotation.y = THREE.MathUtils.degToRad((Math.random() - 0.5) * 8);
        scene.add(print);
        // clip suggestion: a tiny dark square at the top
        const clip = new THREE.Mesh(
          new THREE.BoxGeometry(0.06, 0.06, 0.02),
          baseMat
        );
        clip.position.set(x, H - 1.14, D/2 - 1.6);
        scene.add(clip);
      }

      // backlit etched-glass whiteboard on the front wall
      const wb = makePlaceholderWhiteboard({
        width: 3.0, height: 1.8,
        color: 0xb8c8cc, emissive: 0x607880, frameColor: 0x141414
      });
      wb.position.set(0, 1.7, -D/2 + 0.04);
      wb.userData.boardKind = 'etched-glass';
      scene.add(wb);

      // back door
      const backDoor = buildBackDoor(D, shared.doorWood);
      scene.add(backDoor);

      return {
        scene, width: W, depth: D, height: H,
        backDoor, whiteboard: wb,
        entryYaw: 0,  // camera enters looking -Z (toward the whiteboard)
        doors: [backDoor]
      };
    }
    ROOM_BUILDERS['photography-darkroom'] = buildPhotographyDarkroom;

    // ----------------------------------------------------------------
    // FURNISHED: greenhouse
    //   claude-dev-framework -> glass walls, white steel frame,
    //   terracotta + slate floor, grow lights + filtered daylight,
    //   potting bench with a chalkboard easel.
    // ----------------------------------------------------------------
    function buildGreenhouse(project, roomTypeId, shared) {
      // slate floor — cool gray with a hint of pattern
      const slate = plasterTexture({ base: '#5a605c', noise: 18 });
      slate.repeat.set(3, 3);
      const floorMat = new THREE.MeshStandardMaterial({
        map: slate, color: 0x808680, roughness: 0.9
      });
      // bright white-painted plaster walls behind a steel frame
      const wallPlaster = plasterTexture({ base: '#e8eee6', noise: 8 });
      wallPlaster.repeat.set(2, 1.2);
      const wallMat = new THREE.MeshStandardMaterial({
        map: wallPlaster, color: 0xc8d0c4, roughness: 0.85,
        emissive: 0x404844, emissiveIntensity: 0.3
      });
      // emissive ceiling so it reads as a glass roof letting daylight in
      const ceilingMat = new THREE.MeshStandardMaterial({
        color: 0xeef4ee, roughness: 0.5,
        emissive: 0xa8c8d4, emissiveIntensity: 0.85
      });

      const shell = makeRoomShell({
        width: 7.0, depth: 6.0, height: 4.4,
        floorMaterial: floorMat,
        ceilingMaterial: ceilingMat,
        wallFront: wallMat, wallBack: wallMat,
        wallLeft: wallMat, wallRight: wallMat,
        fogColor: 0xd8e4d8, fogNear: 6, fogFar: 22
      });
      const scene = shell.scene;
      const W = shell.width, D = shell.depth, H = shell.height;

      // strong cool-from-above hemisphere — the daylight
      const hemi = new THREE.HemisphereLight(0xddeeff, 0x6a5040, 1.1);
      scene.add(hemi);
      // a key sun-direction-ish light from the front-top
      const sun = new THREE.DirectionalLight(0xfff0d0, 1.4);
      sun.position.set(2, 6, 1);
      scene.add(sun);
      scene.add(new THREE.AmbientLight(0xffffff, 0.45));

      // two grow lights mounted on the ceiling — pink-magenta tint
      const growLightHue = 0xff70b8;
      for (const x of [-W/4, W/4]) {
        const housing = new THREE.Mesh(
          new THREE.BoxGeometry(1.6, 0.08, 0.4),
          new THREE.MeshStandardMaterial({ color: 0xeeeeee, roughness: 0.6 })
        );
        housing.position.set(x, H - 0.15, 0);
        scene.add(housing);
        // glowing strip beneath
        const strip = new THREE.Mesh(
          new THREE.PlaneGeometry(1.5, 0.3),
          new THREE.MeshBasicMaterial({ color: growLightHue })
        );
        strip.rotation.x = Math.PI / 2;
        strip.position.set(x, H - 0.21, 0);
        scene.add(strip);
        const gl = new THREE.PointLight(growLightHue, 0.7, 6, 1.8);
        gl.position.set(x, H - 0.4, 0);
        scene.add(gl);
      }

      // white steel structural frame — a few vertical posts + cross-rails
      const steel = new THREE.MeshStandardMaterial({
        color: 0xf0f0ec, roughness: 0.4, metalness: 0.3
      });
      const postGeo = new THREE.BoxGeometry(0.08, H, 0.08);
      for (const [x, z] of [[-W/2 + 0.05, -D/2 + 0.05], [W/2 - 0.05, -D/2 + 0.05],
                            [-W/2 + 0.05, D/2 - 0.05],  [W/2 - 0.05, D/2 - 0.05]]) {
        const post = new THREE.Mesh(postGeo, steel);
        post.position.set(x, H/2, z);
        scene.add(post);
      }
      // upper horizontal rails along the long walls
      const railGeo = new THREE.BoxGeometry(W, 0.06, 0.06);
      for (const z of [-D/2 + 0.05, D/2 - 0.05]) {
        const rail = new THREE.Mesh(railGeo, steel);
        rail.position.set(0, H - 0.4, z);
        scene.add(rail);
      }
      // mid-height rail along the side walls (suggests glass framing)
      const railSideGeo = new THREE.BoxGeometry(0.06, 0.06, D);
      for (const x of [-W/2 + 0.05, W/2 - 0.05]) {
        const r1 = new THREE.Mesh(railSideGeo, steel);
        r1.position.set(x, H - 0.4, 0);
        scene.add(r1);
        const r2 = new THREE.Mesh(railSideGeo, steel);
        r2.position.set(x, 1.6, 0);
        scene.add(r2);
      }

      // potting bench against the right wall — heavy wood top + steel legs
      const benchWood = woodTexture({ base: '#6a4222', dark: '#2a1408', stripes: 5 });
      benchWood.repeat.set(1, 1);
      const benchTopMat = new THREE.MeshStandardMaterial({
        map: benchWood, color: 0x8a5a30, roughness: 0.85
      });
      const benchTop = new THREE.Mesh(new THREE.BoxGeometry(2.6, 0.08, 0.7), benchTopMat);
      benchTop.position.set(W/2 - 0.55, 0.9, 0);
      benchTop.rotation.y = -Math.PI / 2;
      scene.add(benchTop);
      const benchLeg = new THREE.BoxGeometry(0.06, 0.86, 0.06);
      for (const zp of [-1.1, 1.1]) {
        for (const dx of [-0.3, 0.3]) {
          const leg = new THREE.Mesh(benchLeg, steel);
          leg.position.set(W/2 - 0.55 + dx, 0.43, zp);
          scene.add(leg);
        }
      }
      // a lower shelf with terracotta pots
      const shelf = benchTop.clone();
      shelf.position.y = 0.35;
      scene.add(shelf);

      // terracotta pots with plants (cones for foliage + cylinders for pots)
      const terracotta = new THREE.MeshStandardMaterial({
        color: 0xc46a3a, roughness: 0.92, metalness: 0.0
      });
      const foliage = new THREE.MeshStandardMaterial({
        color: 0x4a8a3a, roughness: 0.85, metalness: 0.0,
        emissive: 0x102a10, emissiveIntensity: 0.15
      });
      const foliageDark = new THREE.MeshStandardMaterial({
        color: 0x2c6a26, roughness: 0.9, metalness: 0.0
      });
      function placePot(x, y, z, kind = 'leafy') {
        const pot = new THREE.Mesh(new THREE.CylinderGeometry(0.16, 0.12, 0.22, 16), terracotta);
        pot.position.set(x, y + 0.11, z);
        scene.add(pot);
        if (kind === 'leafy') {
          const leaves = new THREE.Mesh(new THREE.SphereGeometry(0.22, 14, 10), foliage);
          leaves.position.set(x, y + 0.34, z);
          scene.add(leaves);
        } else if (kind === 'tall') {
          for (let i = 0; i < 3; i++) {
            const blade = new THREE.Mesh(
              new THREE.ConeGeometry(0.05, 0.5 + Math.random() * 0.25, 6),
              foliageDark
            );
            blade.position.set(x + (Math.random() - 0.5) * 0.1, y + 0.5, z + (Math.random() - 0.5) * 0.1);
            blade.rotation.z = (Math.random() - 0.5) * 0.3;
            scene.add(blade);
          }
        } else if (kind === 'small') {
          const leaves = new THREE.Mesh(new THREE.SphereGeometry(0.14, 12, 8), foliage);
          leaves.position.set(x, y + 0.26, z);
          scene.add(leaves);
        }
      }
      // pots on the upper bench
      placePot(W/2 - 0.55,           0.98, -0.8,  'leafy');
      placePot(W/2 - 0.55 + 0.25,    0.98,  0.0,  'tall');
      placePot(W/2 - 0.55,           0.98,  0.8,  'leafy');
      placePot(W/2 - 0.55 - 0.2,     0.98, -0.2,  'small');
      // pots on the lower shelf
      placePot(W/2 - 0.55,           0.43, -0.7,  'small');
      placePot(W/2 - 0.55,           0.43,  0.7,  'leafy');

      // a freestanding planter on the left side of the room
      const bigPot = new THREE.Mesh(new THREE.CylinderGeometry(0.42, 0.32, 0.65, 20), terracotta);
      bigPot.position.set(-W/2 + 0.9, 0.33, -D/2 + 1.0);
      scene.add(bigPot);
      const bigPlant = new THREE.Mesh(new THREE.SphereGeometry(0.55, 18, 12), foliage);
      bigPlant.position.set(-W/2 + 0.9, 1.0, -D/2 + 1.0);
      scene.add(bigPlant);

      // chalkboard easel near the potting bench — placed slightly
      // forward of the front wall and angled, but the actual
      // whiteboard plane on the FRONT wall carries the project data
      // (so the camera's auto-aim hits it).
      const easelWood = new THREE.MeshStandardMaterial({
        color: 0x3a2410, roughness: 0.9
      });
      const tripod = new THREE.Group();
      const legGeo2 = new THREE.BoxGeometry(0.04, 1.7, 0.04);
      for (const ang of [-0.25, 0.25, 0]) {
        const leg = new THREE.Mesh(legGeo2, easelWood);
        leg.position.set(Math.sin(ang) * 0.5, 0.85, Math.cos(ang) * (ang === 0 ? -0.3 : 0.3));
        leg.rotation.z = ang;
        if (ang === 0) leg.rotation.x = -0.2;
        tripod.add(leg);
      }
      tripod.position.set(-1.6, 0, -D/2 + 1.4);
      scene.add(tripod);

      // The whiteboard itself: chalkboard styling, but on the front
      // wall so the entering camera sees it.
      const wb = makePlaceholderWhiteboard({
        width: 2.8, height: 1.7,
        color: 0x1a2418, emissive: 0x101a10, frameColor: 0x3a2410
      });
      wb.position.set(0, 1.7, -D/2 + 0.04);
      wb.userData.boardKind = 'chalkboard';
      scene.add(wb);

      // back door
      const backDoor = buildBackDoor(D, shared.doorWood);
      scene.add(backDoor);

      return {
        scene, width: W, depth: D, height: H,
        backDoor, whiteboard: wb,
        entryYaw: 0,
        doors: [backDoor]
      };
    }
    ROOM_BUILDERS['greenhouse'] = buildGreenhouse;

    // ----------------------------------------------------------------
    // FURNISHED: blacksmith-forge
    //   alden-stack -> stone walls, blackened iron, leather, coal forge
    //   with orange glow dominating the lighting; anvil, water trough,
    //   hammered iron leaning on a wall; hand-forged frame whiteboard.
    // ----------------------------------------------------------------
    function buildBlacksmithForge(project, roomTypeId, shared) {
      // stone wall texture — large irregular stones via plaster-with-noise
      const stone = plasterTexture({ base: '#4a4540', noise: 30 });
      stone.repeat.set(2.5, 1.5);
      const stoneMat = new THREE.MeshStandardMaterial({
        map: stone, color: 0x686058, roughness: 0.95
      });
      // floor: dark slate-ish with subtle pattern
      const floorStone = plasterTexture({ base: '#33302c', noise: 22 });
      floorStone.repeat.set(3, 3);
      const floorMat = new THREE.MeshStandardMaterial({

    // ----------------------------------------------------------------
    // Small shared helper: a checkerboard tile texture.
    // ----------------------------------------------------------------
    function tileTexture({size=512, cells=8, a='#c8c4be', b='#7a7670', grout='#3a3834'} = {}) {
      const c = document.createElement('canvas');
      c.width = c.height = size;
      const ctx = c.getContext('2d');
      ctx.fillStyle = grout;
      ctx.fillRect(0, 0, size, size);
      const s = size / cells;
      for (let y = 0; y < cells; y++) {
        for (let x = 0; x < cells; x++) {
          ctx.fillStyle = (x + y) % 2 === 0 ? a : b;
          ctx.fillRect(x * s + 2, y * s + 2, s - 4, s - 4);
        }
      }
      const tex = new THREE.CanvasTexture(c);
      tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
      tex.colorSpace = THREE.SRGBColorSpace;
      return tex;
    }

    // ----------------------------------------------------------------
    function buildBrewery(project, roomTypeId, shared) {
      const tile = tileTexture({ a: '#a09a90', b: '#4a4640', grout: '#1a1814' });

      // polished copper material — high metalness, low roughness, warm tint

      // central row of copper kettles along the right side

          copperDark
        );
        baseRing.position.set(x, 0.06, z);
        g.add(baseRing);
        // body
        const body = new THREE.Mesh(
          new THREE.CylinderGeometry(r, r * 0.95, h, 28),
          copper
        );
        body.position.set(x, 0.06 + h / 2 + 0.06, z);
        g.add(body);
        // domed top
        const dome = new THREE.Mesh(
          new THREE.SphereGeometry(r * 0.95, 24, 12, 0, Math.PI * 2, 0, Math.PI / 2),
          copper
        );
        dome.position.set(x, 0.06 + h + 0.12, z);
        g.add(dome);

        const chimney = new THREE.Mesh(

          copperDark

        chimney.position.set(x, 0.06 + h + 0.5, z);
        g.add(chimney);
        return g;

      scene.add(kettle(W/2 - 1.0,  1.4, 0.6, 1.5));

      pipe.rotation.x = Math.PI / 2;

      // riser to the ceiling
      const riser = new THREE.Mesh(new THREE.CylinderGeometry(0.06, 0.06, 1.0, 12), pipeMat);
      riser.position.set(W/2 - 1.0, H - 0.6, 0);
      scene.add(riser);

      const stainless = new THREE.MeshStandardMaterial({
        color: 0xa0a4a8, roughness: 0.35, metalness: 0.85

      function ferm(x, z) {
        const g = new THREE.Group();
        const tank = new THREE.Mesh(
          new THREE.CylinderGeometry(0.5, 0.5, 2.0, 24),
          stainless
        );
        tank.position.set(x, 1.1, z);

        cone.position.set(x, 0.4, z);
        cone.rotation.x = Math.PI;
        g.add(cone);

        const top = new THREE.Mesh(
          new THREE.SphereGeometry(0.5, 24, 12, 0, Math.PI * 2, 0, Math.PI / 2),
          stainless
        );
        top.position.set(x, 2.1, z);
        g.add(top);
        // small valve
        const valve = new THREE.Mesh(
          new THREE.BoxGeometry(0.12, 0.08, 0.16),
          copperDark
        );
        valve.position.set(x + 0.45, 0.5, z);
        g.add(valve);
        return g;

      scene.add(ferm(-W/2 + 0.9, -1.1));
      scene.add(ferm(-W/2 + 0.9,  1.1));

      // a couple of oak barrels on the floor by the front-left corner
      const oak = new THREE.MeshStandardMaterial({ color: 0x6a3a18, roughness: 0.9 });
      const bands = new THREE.MeshStandardMaterial({ color: 0x2a1808, roughness: 0.6, metalness: 0.5 });
      function barrel(x, z, rot = 0) {
        const g = new THREE.Group();
        const body = new THREE.Mesh(new THREE.CylinderGeometry(0.34, 0.34, 0.8, 18), oak);
        const band1 = new THREE.Mesh(new THREE.CylinderGeometry(0.36, 0.36, 0.05, 18), bands);
        band1.position.y = 0.32;
        const band2 = new THREE.Mesh(new THREE.CylinderGeometry(0.36, 0.36, 0.05, 18), bands);
        band2.position.y = -0.32;
        g.add(body, band1, band2);
        g.position.set(x, 0.4, z);
        g.rotation.z = rot;
        return g;
      }
      scene.add(barrel(-W/2 + 0.8, -D/2 + 1.0));
      scene.add(barrel(-W/2 + 1.5, -D/2 + 1.2, Math.PI/2));

      // slate whiteboard hung on the brick front wall
      const wb = makePlaceholderWhiteboard({
        width: 2.8, height: 1.7,
        color: 0x2c2620, emissive: 0x141008, frameColor: 0x1a1208
      });
      wb.position.set(0, 1.75, -D/2 + 0.04);
      wb.userData.boardKind = 'iron-framed-slate';
      scene.add(wb);

      const backDoor = buildBackDoor(D, shared.doorWood);
      scene.add(backDoor);

      return {
        scene, width: W, depth: D, height: H,
        backDoor, whiteboard: wb,
        entryYaw: 0,
        doors: [backDoor]
      };
    }

      kilnGlow.position.set(-W/2 + 0.85, 1.0, D/2 - 0.85);
      scene.add(kilnGlow);

      // wood shelves along the left wall with little pots
      const shelfMat = new THREE.MeshStandardMaterial({ color: 0x6a4628, roughness: 0.95 });
      const terracotta = new THREE.MeshStandardMaterial({ color: 0xc46a3a, roughness: 0.92 });
      const glazedGreen = new THREE.MeshStandardMaterial({ color: 0x4a8068, roughness: 0.5, metalness: 0.05 });
      const cream = new THREE.MeshStandardMaterial({ color: 0xe8d8b0, roughness: 0.8 });
      for (let i = 0; i < 3; i++) {
        const y = 0.9 + i * 0.85;
        const shelf = new THREE.Mesh(new THREE.BoxGeometry(0.36, 0.04, 2.6), shelfMat);
        shelf.position.set(-W/2 + 0.22, y, -0.4);
        scene.add(shelf);
        // pots on shelf
        for (let k = 0; k < 4; k++) {
          const zp = -0.4 + (k - 1.5) * 0.6;
          const mat = [terracotta, glazedGreen, cream, terracotta][(i + k) % 3];
          const pot = new THREE.Mesh(
            new THREE.CylinderGeometry(0.09 + Math.random()*0.04, 0.1, 0.18 + Math.random()*0.1, 14),
            mat
          );
          pot.position.set(-W/2 + 0.22, y + 0.13, zp);
          scene.add(pot);
        }
      }

      // a stack of clay slabs on the floor near the front
      const slabMat = new THREE.MeshStandardMaterial({ color: 0x8a7058, roughness: 0.95 });
      for (let i = 0; i < 4; i++) {
        const slab = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.05, 0.4), slabMat);
        slab.position.set(W/2 - 1.2, 0.025 + i * 0.05, 1.6);
        scene.add(slab);
      }

      // whiteboard with a "mosaic" frame of terracotta tiles
      const wb = makePlaceholderWhiteboard({
        width: 2.7, height: 1.7,
        color: 0xf2e8d0, emissive: 0x4a3a18, frameColor: 0x6a4828
      });
      // add a mosaic of terracotta cubes around the frame
      const tileMat = new THREE.MeshStandardMaterial({ color: 0xc46a3a, roughness: 0.85 });
      const tileMat2 = new THREE.MeshStandardMaterial({ color: 0x8a4828, roughness: 0.85 });
      const tw = 0.13, th = 0.13, td = 0.05;
      function tile(x, y, alt = 0) {
        const t = new THREE.Mesh(new THREE.BoxGeometry(tw, th, td), alt ? tileMat2 : tileMat);
        t.position.set(x, y, 0.0);
        wb.add(t);
      }
      const tilesPerSide = 18;
      for (let i = 0; i < tilesPerSide; i++) {
        const x = -2.7/2 - 0.18 + (i + 0.5) * (2.7 + 0.36) / tilesPerSide;
        tile(x, +1.7/2 + 0.18, i % 2);
        tile(x, -1.7/2 - 0.18, (i + 1) % 2);
      }
      const tilesVert = 10;
      for (let j = 0; j < tilesVert; j++) {
        const y = -1.7/2 - 0.05 + (j + 0.5) * (1.7 + 0.1) / tilesVert;
        tile(-2.7/2 - 0.18, y, j % 2);
        tile(+2.7/2 + 0.18, y, (j + 1) % 2);
      }
      wb.position.set(0, 1.75, -D/2 + 0.04);
      wb.userData.boardKind = 'default';
      scene.add(wb);

      const backDoor = buildBackDoor(D, shared.doorWood);
      scene.add(backDoor);

      return {
        scene, width: W, depth: D, height: H,
        backDoor, whiteboard: wb,
        entryYaw: 0,
        doors: [backDoor]
      };
    }

    // ----------------------------------------------------------------
    function buildCncMillCell(project, roomTypeId, shared) {
      const polishedConcrete = plasterTexture({ base: '#6a6e72', noise: 10 });
      polishedConcrete.repeat.set(2.5, 2.5);
      const floorMat = new THREE.MeshStandardMaterial({
        map: polishedConcrete, color: 0x707478, roughness: 0.35, metalness: 0.1
      });

        emissive: 0xa0c0d0, emissiveIntensity: 0.6

      const shell = makeRoomShell({
        width: 7.0, depth: 6.5, height: 4.0,
        floorMaterial: floorMat, ceilingMaterial: ceilingMat,
        wallFront: wallPaint, wallBack: wallPaint,
        wallLeft: wallPaint, wallRight: wallPaint,
        fogColor: 0x6a7078, fogNear: 6, fogFar: 22

      const scene = shell.scene;
      const W = shell.width, D = shell.depth, H = shell.height;

      scene.add(new THREE.AmbientLight(0xc8d4e0, 0.75));
      scene.add(new THREE.HemisphereLight(0xe0f0ff, 0x303a48, 0.65));
      const fluo1 = new THREE.RectAreaLight(0xffffff, 6, 2.0, 0.4);
      fluo1.position.set(-1.5, H - 0.1, 0);
      fluo1.rotation.x = -Math.PI / 2;
      scene.add(fluo1);
      const fluo2 = fluo1.clone();
      fluo2.position.set(1.5, H - 0.1, 0);
      scene.add(fluo2);
      // visible fluorescent housings
      const fluoMat = new THREE.MeshBasicMaterial({ color: 0xeef4ff });
      for (const x of [-1.5, 1.5]) {
        const housing = new THREE.Mesh(new THREE.BoxGeometry(2.0, 0.06, 0.4), fluoMat);
        housing.position.set(x, H - 0.08, 0);
        scene.add(housing);

      // ------- CNC mill enclosure (the centerpiece) -------
      const machineGreen = new THREE.MeshStandardMaterial({
        color: 0x4a6850, roughness: 0.55, metalness: 0.4
      });
      const machineDark = new THREE.MeshStandardMaterial({
        color: 0x202824, roughness: 0.7, metalness: 0.5

        color: 0x18302a, roughness: 0.15, metalness: 0.2,

      const millGroup = new THREE.Group();
      millGroup.position.set(0, 0, 0.5);

      millBase.position.set(0, 0.25, 0);
      millGroup.add(millBase);
      // main body
      const millBody = new THREE.Mesh(new THREE.BoxGeometry(2.4, 1.8, 1.6), machineGreen);
      millBody.position.set(0, 1.4, 0);
      millGroup.add(millBody);
      // tinted window on the front
      const window1 = new THREE.Mesh(new THREE.BoxGeometry(1.6, 1.1, 0.02), glassMat);
      window1.position.set(0, 1.55, 0.81);
      millGroup.add(window1);
      // little glow from inside
      const insideGlow = new THREE.PointLight(0xb0e0d0, 1.2, 3, 1.5);
      insideGlow.position.set(0, 1.4, 0.5);
      millGroup.add(insideGlow);
      // hint of the cutter inside (a vertical post + spindle)
      const post = new THREE.Mesh(new THREE.BoxGeometry(0.12, 1.0, 0.12), machineDark);
      post.position.set(0, 1.9, 0.3);
      millGroup.add(post);
      const spindle = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.05, 0.4, 12), new THREE.MeshStandardMaterial({ color: 0xb8bcc0, roughness: 0.4, metalness: 0.8 }));
      spindle.position.set(0, 1.4, 0.3);
      millGroup.add(spindle);
      // top hood
      const millTop = new THREE.Mesh(new THREE.BoxGeometry(2.4, 0.3, 1.6), machineDark);
      millTop.position.set(0, 2.45, 0);
      millGroup.add(millTop);
      // label strip
      const labelMat = new THREE.MeshBasicMaterial({ color: 0xeaeaea });
      const labelStrip = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.15, 0.02), labelMat);
      labelStrip.position.set(0, 2.18, 0.82);

      // ------- control pendant on swing arm -------
      const armMat = new THREE.MeshStandardMaterial({ color: 0x202428, roughness: 0.6, metalness: 0.7 });

      arm1.position.set(1.2, 2.0, 0.65);
      arm1.rotation.y = -Math.PI / 4;
      scene.add(arm1);
      const pendant = new THREE.Mesh(new THREE.BoxGeometry(0.35, 0.55, 0.1), armMat);
      pendant.position.set(1.7, 1.7, 1.05);

      const pendantScreen = new THREE.Mesh(

      pendantScreen.position.set(1.74, 1.78, 1.10);
      pendantScreen.rotation.y = -Math.PI / 6;
      scene.add(pendantScreen);

      // chip pan with swarf (curled metal shavings)
      const chipPan = new THREE.Mesh(
        new THREE.BoxGeometry(1.4, 0.06, 0.8),

      );
      chipPan.position.set(0, 0.05, 1.6);
      scene.add(chipPan);
      const swarfMat = new THREE.MeshStandardMaterial({ color: 0x9ca0a8, roughness: 0.45, metalness: 0.85 });
      for (let i = 0; i < 14; i++) {

          new THREE.TorusGeometry(0.04 + Math.random() * 0.04, 0.012, 6, 14, Math.PI),

      );
      coolant.rotation.x = -Math.PI / 2;
      coolant.position.set(-1.6, 0.005, 1.4);
      scene.add(coolant);

      // tool cart against the right wall — drawers
      const cartMat = new THREE.MeshStandardMaterial({ color: 0x9c2a22, roughness: 0.55, metalness: 0.4 });
      const cartBody = new THREE.Mesh(new THREE.BoxGeometry(0.7, 1.1, 0.5), cartMat);
      cartBody.position.set(W/2 - 0.45, 0.55, -1.4);
      scene.add(cartBody);
      // drawer faces
      const drawerMat = new THREE.MeshStandardMaterial({ color: 0x7a1612, roughness: 0.5, metalness: 0.5 });
      for (let i = 0; i < 4; i++) {
        const d = new THREE.Mesh(new THREE.BoxGeometry(0.66, 0.22, 0.02), drawerMat);
        d.position.set(W/2 - 0.45, 0.18 + i * 0.26, -1.4 + 0.26);
        scene.add(d);
        // pull
        const pull = new THREE.Mesh(new THREE.BoxGeometry(0.18, 0.02, 0.03), new THREE.MeshStandardMaterial({ color: 0xc0c4c8, roughness: 0.3, metalness: 0.85 }));
        pull.position.set(W/2 - 0.45, 0.18 + i * 0.26, -1.4 + 0.275);
        scene.add(pull);
      }
      // top of cart with a couple of tools — calipers + endmill
      const caliper = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.02, 0.06), new THREE.MeshStandardMaterial({ color: 0xb8c0c8, roughness: 0.35, metalness: 0.8 }));
      caliper.position.set(W/2 - 0.45, 1.13, -1.4);
      scene.add(caliper);
      const endmill = new THREE.Mesh(new THREE.CylinderGeometry(0.025, 0.025, 0.18, 12), new THREE.MeshStandardMaterial({ color: 0xd0d4d8, roughness: 0.4, metalness: 0.9 }));

      // steel-sheet whiteboard mounted on the front wall (left of the mill)
      const wb = makePlaceholderWhiteboard({
        width: 2.6, height: 1.7,
        color: 0xc0c5c8, emissive: 0x303840, frameColor: 0x1a1d20
      });
      wb.position.set(-W/2 + 1.6, 1.85, -D/2 + 0.04);
      wb.userData.boardKind = 'steel-sheet';
      // add rivet-like studs at each corner of the frame
      const stud = new THREE.MeshStandardMaterial({ color: 0x9ea4a8, roughness: 0.4, metalness: 0.7 });
      for (const sx of [-1.3, 1.3]) {
        for (const sy of [-0.85, 0.85]) {
          const s = new THREE.Mesh(new THREE.SphereGeometry(0.035, 12, 8), stud);
          s.position.set(sx, sy, 0.03);
          wb.add(s);

      scene.add(wb);

      const backDoor = buildBackDoor(D, shared.doorWood);
