<!--
The Workshop — Panorama Prototype v1
====================================

Cognitive-accommodation dashboard. A 360° lobby with doors leading to
project rooms, rendered with Three.js. The metaphor is load-bearing:
spatial separation gives Karl's mind an anchor point per project so
context-switching has recall.

See:
- docs/adr/0001-design-decisions.md  — seven design decisions, "cognitive accommodation" reframe
- docs/room-catalog.md               — 50 room type specs + FNV-1a assignment algorithm
- data/projects.json                 — verified-as-of-2026-05-16 project inventory

----------------------------------------------------------------------
PLAN
----------------------------------------------------------------------

Scene structure
---------------
Single Three.js WebGLRenderer + PerspectiveCamera at fixed center.
Two top-level scenes managed by a SceneManager:

  - lobby     — built once on init. 14 doors arranged in a circle by
                domain cluster. Wood floor, brick walls, exposed beams,
                warm pendant lighting.
  - room      — lazily built on door click. Each room is its own
                THREE.Scene constructed by a builder registered in
                ROOM_BUILDERS keyed by room_type id. Unknown ids fall
                back to STUB_ROOM_BUILDER.

Camera sits at origin in every scene. The user only rotates the camera;
they do not translate. Walk-through animation is the only thing that
moves the camera.

Door arrangement (stable, deterministic)
----------------------------------------
14 floor-station projects (status in {shipped, active, blocked}). The
4 annex projects (status in {scoped, planned}) are skipped in v1.

Sorted by domain then alphabetically within domain. Domains placed in
fixed angular ranges so the cluster geometry is permanent across
sessions:

  framework        ->  angles around 270 deg (left of forward)
  app              ->  angles around 0 deg   (forward, biggest cluster)
  mcp              ->  angles around 90 deg  (right)
  infrastructure   ->  angles around 180 deg (behind)

Status shape next to label (colorblind-safe; shape carries the signal):
  shipped = circle, active = square, blocked = triangle.

Room assignment (FNV-1a 32-bit, mod 50)
---------------------------------------
  hash(projectId) % 50  ->  index into the 50-room catalog.

Computed at runtime for any project without an explicit `room_type`.
Verified mapping for current floor projects (2026-05-16 data):

  solo-orchestrator       -> photography-darkroom    ★ FURNISHED
  claude-dev-framework    -> greenhouse              ★ FURNISHED
  alden-stack             -> blacksmith-forge        ★ FURNISHED
  game-shelf              -> dye-vat-room            stub
  k-pdf                   -> glassblowing-studio     stub
  karlban                 -> textile-loom-room       stub
  lancache-orchestrator   -> foundry                 stub
  meshscope               -> radio-station           stub
  reminder-app            -> watchmaker-bench        stub
  command-center          -> dye-vat-room            stub
  memoryco-collab         -> ceramics-studio         stub
  ferrum-corde-llc        -> textile-loom-room       stub
  homelab-core            -> brewery                 stub
  homelab-tls-edge        -> cnc-mill-cell           stub

Furnished room rationale: three flagship projects (solo-orchestrator,
claude-dev-framework, alden-stack) and maximum visual variety —
red-lit dark + bright airy daylight + warm forge orange.

Data loading strategy (both, per spec)
--------------------------------------
1. Embedded JSON in a <script type="application/json"> block — the
   canonical source bundled at build time so file:// works.
2. On startup, try fetch('../data/projects.json'). If it succeeds
   (HTTP served) use the live data; otherwise fall back to embedded.

Interaction model
-----------------
  - Mouse-move pan (middle third of viewport): passive rotation
  - Click-drag: high-gain rotation, drag-distance maps to angle
  - Hover door: glow + scale-up, cursor -> pointer
  - Click door: 600ms walk-through (approach 300 / flash 50 / arrival 250)
  - Inside a room: same pan controls + "back to lobby" door behind user
  - Escape: any time inside a room, return to lobby

Textures
--------
All materials are procedural (CanvasTexture for brick/wood/plaster grain,
plus shader-free colored MeshStandardMaterial). No external image
textures in v1 — keeps the file fully self-contained under 5MB without
needing base64 binary blobs, and the cognitive-accommodation function
does not depend on photoreal materials.

Out of scope for v1 (deferred)
------------------------------
  - 47 of the 50 room types furnished (3 furnished + 11 unique stubs)
  - Annex view for scoped/planned projects
  - Editing whiteboard data inside the dashboard
  - Multi-floor / multi-building layouts
  - Touch / mobile support
  - LOD, instancing, compressed textures, persistent camera state
-->

  <script type="module">
    import * as THREE from 'https://esm.sh/three@0.169.0';

    // ----------------------------------------------------------------
    // Room catalog — the 50 IDs from docs/room-catalog.md, in catalog
    // order. Used by the FNV-1a deterministic assignment algorithm.
    // ----------------------------------------------------------------
    const ROOM_CATALOG = [
      'industrial-machine-shop','electronics-lab','woodshop','foundry','drafting-studio',
      'code-lab','library','observatory','greenhouse','server-closet',
      'atelier','brewery','blacksmith-forge','photography-darkroom','music-recording-booth',
      'glassblowing-studio','ceramics-studio','mechanics-garage','paint-studio','leather-workshop',
      'brass-instrument-shop','watchmaker-bench','cartography-room','apothecary','textile-loom-room',
      'luthier-shop','printmaking-studio','boatbuilding-shed','jewelry-bench','cobbler-shop',
      'taxidermy-studio','butterfly-collection-room','alchemist-laboratory','cartoonist-studio','radio-station',
      'brewery-yeast-lab','ceramic-3d-printer-lab','cnc-mill-cell','dye-vat-room','herbalist-drying-room',
      'coffee-roastery','cheese-cave','recording-mastering-suite','miniature-painter-studio','clockmaker-workshop',
      'magicians-prep-room','naturalist-field-station','cryptographer-room','submarine-control-room','zen-tea-room'
    ];

    // FNV-1a 32-bit. Identical to the algorithm sketch in
    // docs/room-catalog.md so JS, Python, etc. agree on assignments.
    function fnv1a32(str) {
      let h = 0x811c9dc5;
      for (let i = 0; i < str.length; i++) {
        h ^= str.charCodeAt(i);
        h = Math.imul(h, 0x01000193) >>> 0;
      }
      return h >>> 0;
    }
    function assignRoom(projectId) {
      return ROOM_CATALOG[fnv1a32(projectId) % ROOM_CATALOG.length];
    }

    // ----------------------------------------------------------------
    // Data loading: try live fetch, fall back to embedded JSON.
    // ----------------------------------------------------------------
    async function loadProjects() {
      try {
        const r = await fetch('../data/projects.json', { cache: 'no-cache' });
        if (r.ok) return { data: await r.json(), source: 'fetch' };
      } catch (_) { /* fall through to embedded */ }
      const el = document.getElementById('projects-data');
      return { data: JSON.parse(el.textContent), source: 'embedded' };
    }

    // ----------------------------------------------------------------
    // Procedural CanvasTextures. All tile via RepeatWrapping.
    // Kept small (256-512px) so total memory stays light.
    // ----------------------------------------------------------------
    function brickTexture({size=512, brickW=80, brickH=28, mortar='#3a2a22', baseR=140, baseG=72, baseB=58, jitter=30} = {}) {
      const c = document.createElement('canvas');
      c.width = c.height = size;
      const ctx = c.getContext('2d');
      ctx.fillStyle = mortar;
      ctx.fillRect(0, 0, size, size);
      for (let y = 0, row = 0; y < size + brickH; y += brickH, row++) {
        const offset = (row % 2) * (brickW / 2);
        for (let x = -brickW; x < size + brickW; x += brickW) {
          const bx = x + offset;
          const r = baseR + Math.floor((Math.random() - 0.5) * jitter * 2);
          const g = baseG + Math.floor((Math.random() - 0.5) * jitter);
          const b = baseB + Math.floor((Math.random() - 0.5) * jitter);
          ctx.fillStyle = `rgb(${r},${g},${b})`;
          ctx.fillRect(bx + 2, y + 2, brickW - 4, brickH - 4);
          // subtle highlight on top edge
          ctx.fillStyle = `rgba(255,220,180,0.08)`;
          ctx.fillRect(bx + 2, y + 2, brickW - 4, 2);
        }
      }
      const tex = new THREE.CanvasTexture(c);
      tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
      tex.colorSpace = THREE.SRGBColorSpace;
      return tex;
    }

    function woodTexture({size=512, base='#6b3f24', dark='#3a1f10', stripes=14} = {}) {
      const c = document.createElement('canvas');
      c.width = c.height = size;
      const ctx = c.getContext('2d');
      ctx.fillStyle = base;
      ctx.fillRect(0, 0, size, size);
      const plankH = size / stripes;
      for (let i = 0; i < stripes; i++) {
        const y = i * plankH;
        // plank tint variation
        const tint = Math.floor((Math.random() - 0.5) * 25);
        ctx.fillStyle = `rgba(${tint > 0 ? 60+tint : 30-tint},${tint > 0 ? 35+tint : 20},${15},0.4)`;
        ctx.fillRect(0, y, size, plankH);
        // dark seam
        ctx.fillStyle = dark;
        ctx.fillRect(0, y, size, 2);
        // grain lines
        ctx.strokeStyle = 'rgba(20,10,5,0.18)';
        ctx.lineWidth = 1;
        for (let g = 0; g < 3; g++) {
          const gy = y + 4 + Math.random() * (plankH - 8);
          ctx.beginPath();
          ctx.moveTo(0, gy);
          for (let x = 0; x < size; x += 24) {
            ctx.lineTo(x, gy + (Math.random() - 0.5) * 2);
          }
          ctx.stroke();
        }
      }
      const tex = new THREE.CanvasTexture(c);
      tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
      tex.colorSpace = THREE.SRGBColorSpace;
      return tex;
    }

    function plasterTexture({size=512, base='#d8c8a8', noise=15} = {}) {
      const c = document.createElement('canvas');
      c.width = c.height = size;
      const ctx = c.getContext('2d');
      ctx.fillStyle = base;
      ctx.fillRect(0, 0, size, size);
      const img = ctx.getImageData(0, 0, size, size);
      const d = img.data;
      for (let i = 0; i < d.length; i += 4) {
        const n = (Math.random() - 0.5) * noise;
        d[i]   = Math.max(0, Math.min(255, d[i]   + n));
        d[i+1] = Math.max(0, Math.min(255, d[i+1] + n));
        d[i+2] = Math.max(0, Math.min(255, d[i+2] + n));
      }
      ctx.putImageData(img, 0, 0);
      const tex = new THREE.CanvasTexture(c);
      tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
      tex.colorSpace = THREE.SRGBColorSpace;
      return tex;
    }

    // ----------------------------------------------------------------
    // Door builder. Each door is a Group with:
    //   - frame (dark stained wood box around the panel)
    //   - panel (medium wood, slight inward bevel via two planes)
    //   - label plane above with project name + status shape
    // The Group's userData carries the project record + entry pose so
    // raycaster results in lobby code stay clean.
    // ----------------------------------------------------------------
    const STATUS_GLYPHS = {
      shipped: { shape: 'circle',   color: '#5fc36a', label: 'Operational' },
      active:  { shape: 'square',   color: '#e3a23a', label: 'In Build'    },
      blocked: { shape: 'triangle', color: '#c44c4c', label: 'Blocked'     }
    };

    function doorLabelTexture(project) {
      const w = 1024, h = 256;
      const c = document.createElement('canvas');
      c.width = w; c.height = h;
      const ctx = c.getContext('2d');
      // brass plaque background
      const grad = ctx.createLinearGradient(0, 0, 0, h);
      grad.addColorStop(0, '#2a1d12');
      grad.addColorStop(1, '#120b06');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, w, h);
      // border
      ctx.strokeStyle = '#a07a3a';
      ctx.lineWidth = 6;
      ctx.strokeRect(8, 8, w - 16, h - 16);

      // status shape (left side)
      const glyph = STATUS_GLYPHS[project.status] || STATUS_GLYPHS.active;
      const cx = 90, cy = h / 2, sz = 56;
      ctx.fillStyle = glyph.color;
      ctx.strokeStyle = '#f0e6d6';
      ctx.lineWidth = 4;
      if (glyph.shape === 'circle') {
        ctx.beginPath(); ctx.arc(cx, cy, sz/2, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
      } else if (glyph.shape === 'square') {
        ctx.fillRect(cx - sz/2, cy - sz/2, sz, sz);
        ctx.strokeRect(cx - sz/2, cy - sz/2, sz, sz);
      } else {
        // equilateral triangle pointing up
        ctx.beginPath();
        ctx.moveTo(cx, cy - sz/2);
        ctx.lineTo(cx + sz/2, cy + sz/2);
        ctx.lineTo(cx - sz/2, cy + sz/2);
        ctx.closePath();
        ctx.fill(); ctx.stroke();
      }

      // name
      ctx.fillStyle = '#f0e6d6';
      ctx.textBaseline = 'middle';
      ctx.font = '600 56px -apple-system, "Segoe UI", Helvetica, sans-serif';
      // wrap long names
      const maxTextW = w - 200;
      const words = project.name.split(/\s+/);
      const lines = [];
      let line = '';
      for (const word of words) {
        const candidate = line ? line + ' ' + word : word;
        if (ctx.measureText(candidate).width > maxTextW && line) {
          lines.push(line); line = word;
        } else {
          line = candidate;
        }
      }
      if (line) lines.push(line);
      if (lines.length > 2) { lines.length = 2; lines[1] = lines[1].slice(0, -1) + '...'; }
      const fontSize = lines.length === 1 ? 56 : 42;
      ctx.font = `600 ${fontSize}px -apple-system, "Segoe UI", Helvetica, sans-serif`;
      const totalH = lines.length * fontSize * 1.1;
      let ty = h/2 - totalH/2 + fontSize/2;
      for (const ln of lines) {
        ctx.fillText(ln, 160, ty);
        ty += fontSize * 1.1;
      }

      const tex = new THREE.CanvasTexture(c);
      tex.colorSpace = THREE.SRGBColorSpace;
      tex.anisotropy = 8;
      return tex;
    }

    function buildDoor(project, woodTex) {
      const group = new THREE.Group();
      group.name = `door:${project.id}`;

      // panel
      const panelW = 1.4, panelH = 2.4, panelD = 0.08;
      const panelMat = new THREE.MeshStandardMaterial({
        map: woodTex,
        color: 0x8a5a35,
        roughness: 0.85,
        metalness: 0.05
      });
      const panel = new THREE.Mesh(
        new THREE.BoxGeometry(panelW, panelH, panelD),
        panelMat
      );
      panel.position.y = panelH / 2;
      group.add(panel);

      // frame: thin box around panel
      const frameMat = new THREE.MeshStandardMaterial({
        color: 0x2c1a0e, roughness: 0.95, metalness: 0.0
      });
      const frameDepth = 0.14, frameThick = 0.12;
      const top = new THREE.Mesh(new THREE.BoxGeometry(panelW + frameThick * 2, frameThick, frameDepth), frameMat);
      top.position.set(0, panelH + frameThick/2, 0);
      group.add(top);
      const left = new THREE.Mesh(new THREE.BoxGeometry(frameThick, panelH + frameThick * 2, frameDepth), frameMat);
      left.position.set(-panelW/2 - frameThick/2, panelH/2 + frameThick/2 - frameThick/2, 0);
      group.add(left);
      const right = left.clone();
      right.position.x = panelW/2 + frameThick/2;
      group.add(right);

      // doorknob
      const knobMat = new THREE.MeshStandardMaterial({ color: 0xb38b3d, roughness: 0.4, metalness: 0.6 });
      const knob = new THREE.Mesh(new THREE.SphereGeometry(0.06, 16, 12), knobMat);
      knob.position.set(panelW/2 - 0.18, panelH/2, panelD/2 + 0.02);
      group.add(knob);

      // label plaque above the frame
      const labelTex = doorLabelTexture(project);
      const labelMat = new THREE.MeshBasicMaterial({ map: labelTex, transparent: false });
      const labelW = panelW + frameThick * 2 + 0.4;
      const labelH = labelW * (256/1024);
      const label = new THREE.Mesh(new THREE.PlaneGeometry(labelW, labelH), labelMat);
      label.position.set(0, panelH + frameThick + labelH/2 + 0.1, 0.01);
      group.add(label);

      // raycast target — a single oversized plane that catches clicks
      // on either the panel or the label without the per-mesh hit
      // ambiguity that nested meshes would create.
      const hitMat = new THREE.MeshBasicMaterial({ visible: false });
      const hit = new THREE.Mesh(
        new THREE.PlaneGeometry(panelW + frameThick * 2 + 0.4, panelH + frameThick * 2 + labelH + 0.2),
        hitMat
      );
      hit.position.set(0, (panelH + frameThick + labelH + 0.1) / 2 + 0.1, 0.02);
      hit.userData.isDoorHit = true;
      group.add(hit);

      group.userData = {
        project,
        hitMesh: hit,
        panel,
        label,
        // for hover scale-up
        baseScale: 1,
        hoverScale: 1.06,
        // entry pose for walk-through (filled in by lobby builder)
        entryPosition: null,
        entryLookAt: null
      };
      return group;
    }

    // ----------------------------------------------------------------
    // Lobby builder.
    // 14 doors clustered by domain at fixed angular ranges.
    // ----------------------------------------------------------------
    const DOMAIN_CLUSTER = {
      framework:      { centerDeg: 270, spanDeg: 30 },
      app:            { centerDeg:   0, spanDeg: 80 },
      mcp:            { centerDeg:  90, spanDeg: 40 },
      infrastructure: { centerDeg: 180, spanDeg: 40 }
    };
    const DOMAIN_ORDER = ['framework', 'app', 'mcp', 'infrastructure'];

    function floorStations(projectsData) {
      const floor = projectsData.projects.filter(p =>
        p.status === 'shipped' || p.status === 'active' || p.status === 'blocked'
      );
      // Sort by domain order, then alphabetically by id within domain.
      floor.sort((a, b) => {
        const da = DOMAIN_ORDER.indexOf(a.domain);
        const db = DOMAIN_ORDER.indexOf(b.domain);
        if (da !== db) return da - db;
        return a.id.localeCompare(b.id);
      });
      return floor;
    }

    function doorAnglesByDomain(projects) {
      // Group projects by domain, then spread within each cluster's arc.
      const byDomain = {};
      for (const p of projects) {
        (byDomain[p.domain] ||= []).push(p);
      }
      const result = []; // [{ project, angleDeg }]
      for (const domain of DOMAIN_ORDER) {
        const list = byDomain[domain] || [];
        if (!list.length) continue;
        const cluster = DOMAIN_CLUSTER[domain];
        const { centerDeg, spanDeg } = cluster;
        const n = list.length;
        // Distribute n doors centered on centerDeg, spanning spanDeg.
        // For n=1, just centerDeg; for n>1, evenly spaced.
        const step = n > 1 ? spanDeg / (n - 1) : 0;
        const start = centerDeg - spanDeg / 2;
        for (let i = 0; i < n; i++) {
          const angleDeg = n === 1 ? centerDeg : start + step * i;
          result.push({ project: list[i], angleDeg });
        }
      }
      return result;
    }

    function buildLobby(projectsData) {
      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x18110a);
      scene.fog = new THREE.Fog(0x18110a, 12, 26);

      const radius = 8;
      const height = 6;

      // floor — warm wood
      const floorWood = woodTexture({ base: '#5a3522', dark: '#2a1408', stripes: 10 });
      floorWood.repeat.set(4, 4);
      const floorMat = new THREE.MeshStandardMaterial({
        map: floorWood, color: 0xa07050, roughness: 0.9, metalness: 0.0
      });
      const floor = new THREE.Mesh(new THREE.CircleGeometry(radius, 64), floorMat);
      floor.rotation.x = -Math.PI / 2;
      floor.position.y = 0;
      scene.add(floor);

      // walls — brick cylinder, interior visible
      const brick = brickTexture({});
      brick.repeat.set(6, 2);
      const wallMat = new THREE.MeshStandardMaterial({
        map: brick, color: 0xb08070, roughness: 0.95, metalness: 0.0, side: THREE.BackSide
      });
      const wall = new THREE.Mesh(
        new THREE.CylinderGeometry(radius, radius, height, 64, 1, true),
        wallMat
      );
      wall.position.y = height / 2;
      scene.add(wall);

      // ceiling — plaster, dimmer
      const plaster = plasterTexture({ base: '#a08660', noise: 18 });
      plaster.repeat.set(2, 2);
      const ceilingMat = new THREE.MeshStandardMaterial({
        map: plaster, color: 0x705030, roughness: 1.0, metalness: 0.0
      });
      const ceiling = new THREE.Mesh(new THREE.CircleGeometry(radius, 64), ceilingMat);
      ceiling.rotation.x = Math.PI / 2;
      ceiling.position.y = height;
      scene.add(ceiling);

      // exposed wooden beams across the ceiling
      const beamWood = new THREE.MeshStandardMaterial({
        color: 0x3a2410, roughness: 0.9, metalness: 0.0
      });
      const beamCount = 5;
      for (let i = 0; i < beamCount; i++) {
        const t = (i + 1) / (beamCount + 1);
        const x = (t - 0.5) * 2 * radius;
        const beam = new THREE.Mesh(
          new THREE.BoxGeometry(0.4, 0.35, 2 * Math.sqrt(Math.max(0, radius*radius - x*x))),
          beamWood
        );
        beam.position.set(x, height - 0.25, 0);
        scene.add(beam);
      }

      // central pendant light (visible body + light source)
      const pendantGroup = new THREE.Group();
      const cordMat = new THREE.MeshStandardMaterial({ color: 0x1a1108, roughness: 1.0 });
      const cord = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.02, 1.2, 8), cordMat);
      cord.position.y = height - 0.6;
      pendantGroup.add(cord);
      const shadeMat = new THREE.MeshStandardMaterial({
        color: 0x4a2a14, emissive: 0xff9a40, emissiveIntensity: 0.65, roughness: 0.7
      });
      const shade = new THREE.Mesh(new THREE.ConeGeometry(0.45, 0.55, 24, 1, true), shadeMat);
      shade.position.y = height - 1.3;
      shade.material.side = THREE.DoubleSide;
      pendantGroup.add(shade);
      // glowing bulb visible from below
      const bulbMat = new THREE.MeshBasicMaterial({ color: 0xffd28a });
      const bulb = new THREE.Mesh(new THREE.SphereGeometry(0.12, 16, 12), bulbMat);
      bulb.position.y = height - 1.5;
      pendantGroup.add(bulb);
      scene.add(pendantGroup);

      const pendantLight = new THREE.PointLight(0xffb070, 2.2, 18, 1.6);
      pendantLight.position.set(0, height - 1.5, 0);
      scene.add(pendantLight);

      // ambient warm fill so the brick reads even in shadow
      scene.add(new THREE.AmbientLight(0x6a4828, 0.55));
      // a hint of cool from above for contrast
      const topFill = new THREE.HemisphereLight(0x886644, 0x1a0d05, 0.35);
      scene.add(topFill);

      // wall sconces — one per cluster, just past its center, helping
      // readers orient by warmth and giving doors a bit of side light
      for (const dom of DOMAIN_ORDER) {
        const c = DOMAIN_CLUSTER[dom];
        const a = THREE.MathUtils.degToRad(c.centerDeg);
        const sconceLight = new THREE.PointLight(0xff9a55, 1.2, 12, 1.8);
        sconceLight.position.set(
          Math.cos(a) * (radius - 0.7),
          height - 1.6,
          Math.sin(a) * (radius - 0.7)
        );
        scene.add(sconceLight);
        // tiny visible bulb
        const sb = new THREE.Mesh(
          new THREE.SphereGeometry(0.07, 10, 8),
          new THREE.MeshBasicMaterial({ color: 0xffc890 })
        );
        sb.position.copy(sconceLight.position);
        scene.add(sb);
      }

      // doors
      const floorProjects = floorStations(projectsData);
      const placements = doorAnglesByDomain(floorProjects);
      const doorWood = woodTexture({ base: '#7a4d2c', dark: '#2a1408', stripes: 6 });
      const doors = [];
      for (const { project, angleDeg } of placements) {
        const door = buildDoor(project, doorWood);
        const a = THREE.MathUtils.degToRad(angleDeg);
        // Place door against the wall, facing the center.
        const dx = Math.cos(a) * (radius - 0.06);
        const dz = Math.sin(a) * (radius - 0.06);
        door.position.set(dx, 0, dz);
        // Three.js lookAt aligns -Z with (target - position). The door's
        // +Z is the front face (knob + label sit on +Z), so we need
        // -Z to point AWAY from origin -- i.e. look at a point further
        // out along the radial direction. Picking 2*position works
        // because origin is at 0 and the position vector already points
        // radially outward.
        door.lookAt(2 * dx, door.position.y + 1.2, 2 * dz);

        // Entry pose for walk-through animation (defined here so the
        // animator doesn't have to recompute trig).
        door.userData.entryPosition = new THREE.Vector3(dx * 0.55, 1.6, dz * 0.55);
        door.userData.entryLookAt = new THREE.Vector3(dx, 1.6, dz);

        scene.add(door);
        doors.push(door);
      }

      // a faint floor disc/area rug under the camera for cognitive anchor
      const rugMat = new THREE.MeshStandardMaterial({
        color: 0x5a2f1a, roughness: 1.0, metalness: 0.0
      });
      const rug = new THREE.Mesh(new THREE.CircleGeometry(2.2, 48), rugMat);
      rug.rotation.x = -Math.PI / 2;
      rug.position.y = 0.005;
      scene.add(rug);

      return { scene, doors };
    }

    // ----------------------------------------------------------------
    // CameraController — mouse-move passive pan + click-drag fine control.
    // Camera stays at origin (or wherever the SceneManager places it);
    // we only mutate its yaw (and a little pitch).
    // ----------------------------------------------------------------
    class CameraController {
      constructor(camera, dom) {
        this.camera = camera;
        this.dom = dom;
        this.yaw = 0;      // radians, around Y
        this.pitch = 0;    // radians, clamped
        this.targetYaw = 0;
        this.targetPitch = 0;
        this.dragging = false;
        this.dragStart = { x: 0, y: 0, yaw: 0, pitch: 0 };
        this.lastMouse = { x: 0.5, y: 0.5 };
        this.maxPitch = THREE.MathUtils.degToRad(35);
        this.enabled = true;
        this._bind();
      }
      _bind() {
        const d = this.dom;
        d.addEventListener('mousemove', this._onMove = (e) => {
          const rect = d.getBoundingClientRect();
          this.lastMouse.x = (e.clientX - rect.left) / rect.width;
          this.lastMouse.y = (e.clientY - rect.top)  / rect.height;
          if (this.dragging) {
            const dx = (e.clientX - this.dragStart.x) / rect.width;
            const dy = (e.clientY - this.dragStart.y) / rect.height;
            // drag-gain: a full-viewport drag rotates ~120deg yaw / ~60deg pitch
            this.targetYaw   = this.dragStart.yaw   - dx * THREE.MathUtils.degToRad(180);
            this.targetPitch = this.dragStart.pitch - dy * THREE.MathUtils.degToRad(80);
            this.targetPitch = THREE.MathUtils.clamp(this.targetPitch, -this.maxPitch, this.maxPitch);
          }
        });
        d.addEventListener('mousedown', this._onDown = (e) => {
          if (e.button !== 0) return;
          this.dragging = true;
          this.dragStart.x = e.clientX; this.dragStart.y = e.clientY;
          this.dragStart.yaw = this.targetYaw;
          this.dragStart.pitch = this.targetPitch;
        });
        window.addEventListener('mouseup', this._onUp = () => { this.dragging = false; });
      }
      setHeading(yawRad, pitchRad = 0) {
        this.yaw = this.targetYaw = yawRad;
        this.pitch = this.targetPitch = pitchRad;
      }
      update(dt) {
        if (!this.enabled) return;
        if (!this.dragging) {
          // passive mouse-move pan: rotate toward mouse x, only when
          // mouse is in the middle vertical third of the screen.
          if (this.lastMouse.y > 0.33 && this.lastMouse.y < 0.67) {
            // map x from [0,1] to [-1,1], then to small angular velocity
            const xCenter = this.lastMouse.x - 0.5;
            const yawSpeed = xCenter * THREE.MathUtils.degToRad(60); // deg/s at edge
            this.targetYaw -= yawSpeed * dt;
          }
          // slight pitch toward y — encourages looking up/down softly
          if (this.lastMouse.y < 0.33) {
            this.targetPitch = THREE.MathUtils.lerp(this.targetPitch, this.maxPitch * 0.4, 1 - Math.exp(-dt * 2));
          } else if (this.lastMouse.y > 0.67) {
            this.targetPitch = THREE.MathUtils.lerp(this.targetPitch, -this.maxPitch * 0.4, 1 - Math.exp(-dt * 2));
          } else {
            this.targetPitch = THREE.MathUtils.lerp(this.targetPitch, 0, 1 - Math.exp(-dt * 1.5));
          }
        }
        // smooth follow toward targets
        const k = 1 - Math.exp(-dt * 8);
        this.yaw   = THREE.MathUtils.lerp(this.yaw,   this.targetYaw,   k);
        this.pitch = THREE.MathUtils.lerp(this.pitch, this.targetPitch, k);
        this._apply();
      }
      _apply() {
        // Build camera orientation from yaw + pitch. Camera looks down -Z by default.
        // We construct a forward vector and use lookAt for stability.
        const cp = Math.cos(this.pitch), sp = Math.sin(this.pitch);
        const cy = Math.cos(this.yaw),   sy = Math.sin(this.yaw);
        const fwd = new THREE.Vector3(sy * cp, sp, -cy * cp);
        const tgt = this.camera.position.clone().add(fwd);
        this.camera.up.set(0, 1, 0);
        this.camera.lookAt(tgt);
      }
    }

    // ----------------------------------------------------------------
    // HoverPicker — raycaster against door hit-meshes.
    // ----------------------------------------------------------------
    class HoverPicker {
      constructor(camera, dom) {
        this.camera = camera;
        this.dom = dom;
        this.raycaster = new THREE.Raycaster();
        this.ndc = new THREE.Vector2();
        this.hovered = null;
        this.targets = []; // door Groups
        dom.addEventListener('mousemove', (e) => {
          const rect = dom.getBoundingClientRect();
          this.ndc.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
          this.ndc.y = -((e.clientY - rect.top)  / rect.height) * 2 + 1;
        });
      }
      setTargets(doors) {
        this.targets = doors;
        this.hovered = null;
      }
      update() {
        if (!this.targets.length) { this._setHover(null); return; }
        this.raycaster.setFromCamera(this.ndc, this.camera);
        // raycast against hit meshes only
        const hits = this.raycaster.intersectObjects(
          this.targets.map(d => d.userData.hitMesh), false
        );
        let next = null;
        if (hits.length) {
          // ascend to the door Group
          let o = hits[0].object;
          while (o && !o.userData?.project) o = o.parent;
          next = o || null;
        }
        this._setHover(next);
      }
      _setHover(next) {
        if (next === this.hovered) return;
        if (this.hovered) this._applyHover(this.hovered, false);
        this.hovered = next;
        if (this.hovered) this._applyHover(this.hovered, true);
        this.dom.style.cursor = this.hovered ? 'pointer' : 'default';
      }
      _applyHover(door, on) {
        const s = on ? door.userData.hoverScale : door.userData.baseScale;
        door.scale.setScalar(s);
        // brighten the panel emissive slightly
        if (door.userData.panel) {
          const m = door.userData.panel.material;
          m.emissive = m.emissive || new THREE.Color(0x000000);
          m.emissive.setHex(on ? 0x402010 : 0x000000);
        }
      }
    }

    // ----------------------------------------------------------------
    // Room shell — reusable box-shaped room geometry. Per-room builders
    // call this to get floor / walls / ceiling, then add decor + a
    // whiteboard on top.
    //
    // Coordinate convention for rooms:
    //   - room is axis-aligned, dims = w (X) by d (Z) by h (Y)
    //   - camera enters at z = +d/2 - 0.4 looking toward -Z
    //     (the FRONT wall, where the whiteboard sits)
    //   - back-door sits on the back wall at z = +d/2
    //   - +X is "right" of camera entry, -X is "left"
    // ----------------------------------------------------------------
    function makeRoomShell(opts) {
      const {
        width = 6.5, depth = 6.5, height = 4.0,
        floorMaterial, ceilingMaterial,
        wallFront, wallBack, wallLeft, wallRight,  // materials, may differ
        fogColor = 0x100808, fogNear = 5, fogFar = 22
      } = opts;

      const scene = new THREE.Scene();
      scene.background = new THREE.Color(fogColor);
      scene.fog = new THREE.Fog(fogColor, fogNear, fogFar);

      const floor = new THREE.Mesh(new THREE.PlaneGeometry(width, depth), floorMaterial);
      floor.rotation.x = -Math.PI / 2;
      scene.add(floor);

      const ceiling = new THREE.Mesh(new THREE.PlaneGeometry(width, depth), ceilingMaterial);
      ceiling.rotation.x = Math.PI / 2;
      ceiling.position.y = height;
      scene.add(ceiling);

      // Walls: each is a plane facing inward.
      const mkWall = (mat, w, h, pos, rotY) => {
        const m = new THREE.Mesh(new THREE.PlaneGeometry(w, h), mat);
        m.position.set(pos.x, pos.y, pos.z);
        m.rotation.y = rotY;
        return m;
      };
      // front wall (camera looks at): z = -depth/2, normal +Z
      scene.add(mkWall(wallFront, width, height, { x: 0, y: height/2, z: -depth/2 }, 0));
      // back wall (behind camera): z = +depth/2, normal -Z
      scene.add(mkWall(wallBack, width, height, { x: 0, y: height/2, z: +depth/2 }, Math.PI));
      // left wall: x = -width/2, normal +X
      scene.add(mkWall(wallLeft, depth, height, { x: -width/2, y: height/2, z: 0 }, Math.PI / 2));
      // right wall: x = +width/2, normal -X
      scene.add(mkWall(wallRight, depth, height, { x: +width/2, y: height/2, z: 0 }, -Math.PI / 2));

      return { scene, width, depth, height };
    }

    // Build a "back door" — same visual style as the lobby doors, but
    // labeled "Lobby" and not driven from project data. Positioned on
    // the back wall of a room (z = +depth/2), facing the camera (+Z
    // pointing toward -Z, i.e. inward). userData mirrors a normal door
    // so HoverPicker / click handler don't need to special-case it.
    function buildBackDoor(roomDepth, doorWoodTex) {
      // Build a synthetic "project record" so doorLabelTexture renders
      // something distinct for the back door.
      const fakeProject = {
        id: '__back__',
        name: 'Back to Lobby',
        status: 'shipped',
      };
      const door = buildDoor(fakeProject, doorWoodTex);
      // Override label glyph color: use a neutral marker instead of
      // shipped-green so it doesn't claim a project status.
      // (Cheap path: just rebuild the label texture with a custom glyph.)
      const labelCanvas = document.createElement('canvas');
      labelCanvas.width = 1024; labelCanvas.height = 256;
      const ctx = labelCanvas.getContext('2d');
      const grad = ctx.createLinearGradient(0, 0, 0, 256);
      grad.addColorStop(0, '#241710'); grad.addColorStop(1, '#0e0805');
      ctx.fillStyle = grad; ctx.fillRect(0, 0, 1024, 256);
      ctx.strokeStyle = '#a07a3a'; ctx.lineWidth = 6;
      ctx.strokeRect(8, 8, 1008, 240);
      // arrow glyph pointing left
      ctx.strokeStyle = '#f0e6d6'; ctx.fillStyle = '#f0e6d6'; ctx.lineWidth = 5;
      ctx.beginPath();
      ctx.moveTo(140, 128); ctx.lineTo(70, 128);
      ctx.moveTo(95, 100); ctx.lineTo(70, 128); ctx.lineTo(95, 156);
      ctx.stroke();
      ctx.font = '600 56px -apple-system, "Segoe UI", Helvetica, sans-serif';
      ctx.textBaseline = 'middle';
      ctx.fillText('Back to Lobby', 180, 128);
      const newTex = new THREE.CanvasTexture(labelCanvas);
      newTex.colorSpace = THREE.SRGBColorSpace;
      newTex.anisotropy = 8;
      door.userData.label.material.map = newTex;
      door.userData.label.material.needsUpdate = true;

      // Place on back wall, facing -Z (i.e. toward room center / -Z direction).
      // Door geometry default front is +Z, and we want +Z to point at -Z world,
      // so rotate 180 deg around Y.
      door.position.set(0, 0, roomDepth / 2 - 0.06);
      door.rotation.y = Math.PI;

      door.userData.isBack = true;
      // Walk-out animation goes from current camera pose to this entry pose.
      door.userData.entryPosition = new THREE.Vector3(0, 1.6, roomDepth / 2 - 1.4);
      door.userData.entryLookAt = new THREE.Vector3(0, 1.6, roomDepth / 2);

      return door;
    }

    // ----------------------------------------------------------------
    // ROOM_BUILDERS — registry keyed by room_type id. Each builder is
    //   (project, roomTypeId, sharedTextures) -> { scene, width, depth,
    //     height, backDoor, entryYaw, doors:[backDoor] }
    // Furnished rooms register their own entries below; everything else
    // falls back to STUB_ROOM_BUILDER.
    // ----------------------------------------------------------------
    const ROOM_BUILDERS = {};

    // Cache of materials/textures that are safe to share across rooms.
    function makeSharedTextures() {
      return {
        doorWood: woodTexture({ base: '#7a4d2c', dark: '#2a1408', stripes: 6 }),
        lobbyFloorWood: null  // for visual continuity in stubs, reuse lobby palette
      };
    }

    // Stub room — placeholder for any room_type that isn't furnished yet.
    // Uses the lobby's procedural materials so it's cheap and visually
    // recognizable as "you stepped through, but this space isn't built".
    function STUB_ROOM_BUILDER(project, roomTypeId, shared) {
      // procedural materials — wood floor + plaster walls + plaster ceiling
      const floorWood = woodTexture({ base: '#4a3022', dark: '#26140a', stripes: 8 });
      floorWood.repeat.set(2, 2);
      const floorMat = new THREE.MeshStandardMaterial({
        map: floorWood, color: 0x7a5238, roughness: 0.9
      });
      const plaster = plasterTexture({ base: '#9a826a', noise: 16 });
      plaster.repeat.set(1.5, 1);
      const wallMat = new THREE.MeshStandardMaterial({
        map: plaster, color: 0x8a705a, roughness: 1.0, side: THREE.FrontSide
      });
      const ceilingMat = new THREE.MeshStandardMaterial({
        color: 0x3a2818, roughness: 1.0
      });

      const shell = makeRoomShell({
        width: 6, depth: 6, height: 3.8,
        floorMaterial: floorMat,
        ceilingMaterial: ceilingMat,
        wallFront: wallMat, wallBack: wallMat,
        wallLeft: wallMat, wallRight: wallMat,
        fogColor: 0x1a120a, fogNear: 4, fogFar: 18
      });
      const scene = shell.scene;

      // a warm pendant
      const bulb = new THREE.PointLight(0xffa658, 1.6, 12, 1.7);
      bulb.position.set(0, shell.height - 0.6, 0);
      scene.add(bulb);
      const bulbMesh = new THREE.Mesh(
        new THREE.SphereGeometry(0.1, 14, 10),
        new THREE.MeshBasicMaterial({ color: 0xffd49a })
      );
      bulbMesh.position.copy(bulb.position);
      scene.add(bulbMesh);
      scene.add(new THREE.AmbientLight(0x4a3018, 0.45));

      // sign on the front wall
      const sign = document.createElement('canvas');
      sign.width = 1024; sign.height = 512;
      const sctx = sign.getContext('2d');
      sctx.fillStyle = '#1a1108'; sctx.fillRect(0, 0, 1024, 512);
      sctx.strokeStyle = '#a07a3a'; sctx.lineWidth = 8;
      sctx.strokeRect(16, 16, 992, 480);
      sctx.fillStyle = '#f0e6d6';
      sctx.textBaseline = 'middle';
      sctx.textAlign = 'center';
      sctx.font = '600 56px -apple-system, "Segoe UI", Helvetica, sans-serif';
      sctx.fillText('This room is not yet built', 512, 200);
      sctx.font = '400 44px -apple-system, "Segoe UI", Helvetica, sans-serif';
      sctx.fillStyle = '#c7b48a';
      sctx.fillText(`type: ${roomTypeId}`, 512, 290);
      sctx.font = '400 28px -apple-system, "Segoe UI", Helvetica, sans-serif';
      sctx.fillStyle = '#a08660';
      sctx.fillText(project.name, 512, 360);
      sctx.fillText(project.tagline || '', 512, 410);
      const signTex = new THREE.CanvasTexture(sign);
      signTex.colorSpace = THREE.SRGBColorSpace;
      signTex.anisotropy = 8;
      const signW = 3.2, signH = signW * (512/1024);
      const signMesh = new THREE.Mesh(
        new THREE.PlaneGeometry(signW, signH),
        new THREE.MeshBasicMaterial({ map: signTex })
      );
      signMesh.position.set(0, 1.8, -shell.depth/2 + 0.02);
      scene.add(signMesh);

      // back door
      const backDoor = buildBackDoor(shell.depth, shared.doorWood);
      scene.add(backDoor);

      return {
        scene,
        width: shell.width, depth: shell.depth, height: shell.height,
        backDoor,
        // Camera enters facing -Z (the front wall with the sign).
        // Controller forward at yaw=0 is (sin 0, 0, -cos 0) = (0, 0, -1),
        // i.e. -Z. So entryYaw = 0.
        entryYaw: 0,
        doors: [backDoor]
      };
    }

    function buildRoomForProject(project, shared) {
      const roomTypeId = project.room_type || assignRoom(project.id);
      const builder = ROOM_BUILDERS[roomTypeId] || STUB_ROOM_BUILDER;
      const built = builder(project, roomTypeId, shared);
      built.project = project;
      built.roomTypeId = roomTypeId;
      return built;
    }

    // ----------------------------------------------------------------
    // Animator — drives walk-through and reverse animations.
    // State machine within WorkshopApp; the animator is just a tween
    // helper that resolves a promise on completion.
    //
    // Walk-through timeline:
    //   t=0..300ms       approach: camera moves from lobby-center
    //                              toward door, looking at door
    //   t=300..350ms     flash:    DOM #flash opacity 0->1, then scene swap
    //   t=350..600ms     arrival:  flash 1->0, camera slides slightly
    //                              forward into the room
    //
    // Reverse timeline is the mirror of the above.
    // ----------------------------------------------------------------
    function easeInOutCubic(t) {
      return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
    }

    class Animator {
      constructor(app) {
        this.app = app;
        this.active = null; // { kind, startTime, resolve, ... }
      }
      get isActive() { return this.active !== null; }
      walkIntoRoom(door, roomBuilt) {
        return new Promise(resolve => {
          this.active = {
            kind: 'walk-in',
            startTime: performance.now(),
            duration: 600,
            phases: [300, 50, 250],
            door, roomBuilt,
            // lobby start pose
            fromPos: new THREE.Vector3(0, 1.65, 0),
            // approach destination (just outside the door)
            midPos: door.userData.entryPosition.clone(),
            // door world position used as lookAt during approach
            doorWorld: door.getWorldPosition(new THREE.Vector3()),
            // room arrival pose
            roomStartPos: new THREE.Vector3(0, 1.65, roomBuilt.depth / 2 - 0.4),
            roomEndPos:   new THREE.Vector3(0, 1.65, roomBuilt.depth / 2 - 1.0),
            roomLookAt:   new THREE.Vector3(0, 1.65, -roomBuilt.depth / 2 + 0.4),
            resolve
          };
        });
      }
      walkOutToLobby(backDoor) {
        return new Promise(resolve => {
          this.active = {
            kind: 'walk-out',
            startTime: performance.now(),
            duration: 600,
            phases: [250, 50, 300],
            backDoor,
            // current camera state captured at animation start so the
            // approach phase smoothly leaves from wherever the user was.
            fromPos: this.app.camera.position.clone(),
            // approach the back-door (back of the room)
            midPos: backDoor.userData.entryPosition.clone(),
            backWorld: backDoor.getWorldPosition(new THREE.Vector3()),
            // lobby arrival pose — center of lobby, facing the door
            // we just came out of in the lobby (filled in by app)
            lobbyStartPos: new THREE.Vector3(0, 1.65, 0),
            lobbyEndPos:   new THREE.Vector3(0, 1.65, 0),
            lobbyLookAt:   null, // app supplies this
            resolve
          };
        });
      }
      update() {
        const a = this.active;
        if (!a) return;
        const t = performance.now() - a.startTime;
        const [p1, p2, p3] = a.phases;
        const flashEl = document.getElementById('flash');

        if (a.kind === 'walk-in') {
          if (t < p1) {
            // approach phase
            const k = easeInOutCubic(t / p1);
            const pos = a.fromPos.clone().lerp(a.midPos, k);
            this.app.camera.position.copy(pos);
            this.app.camera.lookAt(a.doorWorld);
            flashEl.style.opacity = '0';
          } else if (t < p1 + p2) {
            // flash phase: fade up, swap scene at midpoint
            const phaseT = (t - p1) / p2;
            flashEl.style.opacity = String(phaseT);
            if (!a.swapped && phaseT >= 0.5) {
              // swap to room scene + position camera at room start
              this.app.swapToRoomScene(a.roomBuilt);
              a.swapped = true;
            }
          } else if (t < p1 + p2 + p3) {
            // arrival phase: fade down, slide forward into room
            const phaseT = (t - p1 - p2) / p3;
            flashEl.style.opacity = String(1 - phaseT);
            const pos = a.roomStartPos.clone().lerp(a.roomEndPos, easeInOutCubic(phaseT));
            this.app.camera.position.copy(pos);
            this.app.camera.lookAt(a.roomLookAt);
          } else {
            flashEl.style.opacity = '0';
            this.app.camera.position.copy(a.roomEndPos);
            this.app.camera.lookAt(a.roomLookAt);
            // Hand control back to the controller, aligned with the
            // room's entry yaw.
            this.app.controller.setHeading(a.roomBuilt.entryYaw || 0);
            this.app.controller.enabled = true;
            this.active = null;
            a.resolve();
          }
        } else if (a.kind === 'walk-out') {
          // p1 = approach to back door (250)
          // p2 = flash (50)
          // p3 = arrival in lobby (300)
          if (t < p1) {
            const k = easeInOutCubic(t / p1);
            const pos = a.fromPos.clone().lerp(a.midPos, k);
            this.app.camera.position.copy(pos);
            this.app.camera.lookAt(a.backWorld);
            flashEl.style.opacity = '0';
          } else if (t < p1 + p2) {
            const phaseT = (t - p1) / p2;
            flashEl.style.opacity = String(phaseT);
            if (!a.swapped && phaseT >= 0.5) {
              this.app.swapToLobbyScene();
              a.swapped = true;
            }
          } else if (t < p1 + p2 + p3) {
            const phaseT = (t - p1 - p2) / p3;
            flashEl.style.opacity = String(1 - phaseT);
            const pos = a.lobbyStartPos.clone().lerp(a.lobbyEndPos, easeInOutCubic(phaseT));
            this.app.camera.position.copy(pos);
            if (a.lobbyLookAt) this.app.camera.lookAt(a.lobbyLookAt);
          } else {
            flashEl.style.opacity = '0';
            this.app.camera.position.copy(a.lobbyEndPos);
            // Restore controller heading to face the lobby door the
            // user just exited (so spatial continuity is preserved).
            if (a.lobbyLookAt) {
              const dx = a.lobbyLookAt.x - a.lobbyEndPos.x;
              const dz = a.lobbyLookAt.z - a.lobbyEndPos.z;
              const yaw = Math.atan2(dx, -dz);
              this.app.controller.setHeading(yaw);
            }
            this.app.controller.enabled = true;
            this.active = null;
            a.resolve();
          }
        }
      }
    }

    // ----------------------------------------------------------------
    // WorkshopApp — boots Three.js, builds the lobby, drives the loop,
    // handles walk-through animations and back-to-lobby returns.
    // ----------------------------------------------------------------
    class WorkshopApp {
      constructor(canvas, projectsData) {
        this.canvas = canvas;
        this.projectsData = projectsData;
        this.renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
        this.renderer.outputColorSpace = THREE.SRGBColorSpace;
        this.renderer.toneMapping = THREE.ACESFilmicToneMapping;
        this.renderer.toneMappingExposure = 1.0;
        this._resize();
        window.addEventListener('resize', () => this._resize());

        this.camera = new THREE.PerspectiveCamera(72, window.innerWidth / window.innerHeight, 0.05, 80);
        this.camera.position.set(0, 1.65, 0);

        this.controller = new CameraController(this.camera, canvas);
        this.picker = new HoverPicker(this.camera, canvas);

        this.shared = makeSharedTextures();

        const built = buildLobby(this.projectsData);
        this.lobbyScene = built.scene;
        this.lobbyDoors = built.doors;
        this.activeScene = this.lobbyScene;
        this.picker.setTargets(this.lobbyDoors);

        // State machine: 'lobby' | 'walking-in' | 'in-room' | 'walking-out'
        this.mode = 'lobby';
        // Built rooms are cached so re-entering doesn't rebuild.
        this.roomCache = new Map();
        this.currentRoom = null;
        // Record of which lobby door the user took, so on return the
        // controller's heading restores facing that door (spatial
        // continuity per spec).
        this.returnDoorWorld = null;

        this.animator = new Animator(this);

        // Initial heading: face the app cluster (centered on 0 deg).
        this.controller.setHeading(THREE.MathUtils.degToRad(90));

        this._onClick = (e) => {
          if (this.animator.isActive) return;
          const hov = this.picker.hovered;
          if (!hov) return;
          if (hov.userData.isBack) {
            this._returnToLobby();
          } else {
            this._enterDoor(hov);
          }
        };
        canvas.addEventListener('click', this._onClick);

        this._onKey = (e) => {
          if (e.key === 'Escape' && this.mode === 'in-room' && !this.animator.isActive) {
            this._returnToLobby();
          }
        };
        window.addEventListener('keydown', this._onKey);

        this.clock = new THREE.Clock();
        this._loop = this._loop.bind(this);
        requestAnimationFrame(this._loop);
      }
      _enterDoor(doorGroup) {
        const project = doorGroup.userData.project;
        const roomTypeId = project.room_type || assignRoom(project.id);
        let built = this.roomCache.get(project.id);
        if (!built) {
          built = buildRoomForProject(project, this.shared);
          this.roomCache.set(project.id, built);
        }
        this.currentRoom = built;
        this.returnDoorWorld = doorGroup.getWorldPosition(new THREE.Vector3());

        // Hand off control to the animator.
        this.controller.enabled = false;
        this.mode = 'walking-in';
        this.picker.setTargets([]);

        // Update overlay text.
        document.getElementById('subtitle').textContent =
          project.name + (ROOM_BUILDERS[roomTypeId] ? '' : ' (stub room)');
        document.getElementById('hint').classList.add('hidden');
        document.getElementById('back-hint').classList.remove('hidden');

        this.animator.walkIntoRoom(doorGroup, built).then(() => {
          this.mode = 'in-room';
          this.picker.setTargets(built.doors);
        });
      }
      _returnToLobby() {
        if (!this.currentRoom) return;
        this.controller.enabled = false;
        this.mode = 'walking-out';
        this.picker.setTargets([]);

        const anim = this.animator.walkOutToLobby(this.currentRoom.backDoor);
        // Supply lobby start/end + look-at so the camera arrives at
        // the lobby center facing the door it came out of (symmetric
        // to the walk-in: the room ends with a forward-slide, the
        // lobby starts with a step-back from that door).
        const a = this.animator.active;
        if (a && this.returnDoorWorld) {
          const ret = this.returnDoorWorld;
          a.lobbyStartPos = new THREE.Vector3(ret.x * 0.55, 1.65, ret.z * 0.55);
          a.lobbyEndPos   = new THREE.Vector3(0, 1.65, 0);
          a.lobbyLookAt   = ret.clone();
        }

        document.getElementById('subtitle').textContent = 'Lobby';
        document.getElementById('back-hint').classList.add('hidden');
        document.getElementById('hint').classList.remove('hidden');
        document.getElementById('hint').classList.remove('dim');
        setTimeout(() => document.getElementById('hint').classList.add('dim'), 4500);

        anim.then(() => {
          this.mode = 'lobby';
          this.currentRoom = null;
          this.picker.setTargets(this.lobbyDoors);
        });
      }
      swapToRoomScene(roomBuilt) {
        this.activeScene = roomBuilt.scene;
      }
      swapToLobbyScene() {
        this.activeScene = this.lobbyScene;
      }
      _resize() {
        const w = window.innerWidth, h = window.innerHeight;
        this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        this.renderer.setSize(w, h, false);
        if (this.camera) {
          this.camera.aspect = w / h;
          this.camera.updateProjectionMatrix();
        }
      }
      _loop() {
        const dt = Math.min(0.05, this.clock.getDelta());
        if (this.animator.isActive) {
          this.animator.update();
        } else {
          this.controller.update(dt);
        }
        this.picker.update();
        this.renderer.render(this.activeScene, this.camera);
        requestAnimationFrame(this._loop);
      }
    }

    // ----------------------------------------------------------------
    // Bootstrap.
    // ----------------------------------------------------------------
    (async () => {
      const { data: projectsData, source } = await loadProjects();
      console.log(`[the_workshop] projects loaded via ${source}, ${projectsData.projects.length} projects`);

      const canvas = document.getElementById('view');
      const app = new WorkshopApp(canvas, projectsData);
      window.__workshop = app; // dev convenience

      // hide the loading overlay
      const loading = document.getElementById('loading');
      loading.classList.add('hidden');
      // dim the hint after a few seconds
      setTimeout(() => document.getElementById('hint').classList.add('dim'), 6500);
    })();
  </script>
</body>
</html>
